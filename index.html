<body class="text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        /* @jsxRuntime classic */

        // ============================================================
        // GAS通信ラッパー
        // ============================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwczk4hGoCM2d0SIA_MZbdPlg452xqmYSske15AjxxsDEAIY7jWmhoJUWUSzi9koYw/exec";
        // Google ログイン用のクライアント ID（作成したクライアントIDをここに貼り付けてください）
        const GOOGLE_CLIENT_ID = "85113522675-vrervnlgtsaqgk1iippfqucc3qkips6l.apps.googleusercontent.com";

        const runGas = async (actionName, params = {}) => {
            // ログイン中のメールアドレスがあれば自動的にパラメータへマージ
            const storedEmail = localStorage.getItem('user_email');
            if (storedEmail) {
                if (!params.email) params.email = storedEmail;
                if (!params.myEmail) params.myEmail = storedEmail;
            }

            const isGasEnv = window.google && google.script && google.script.run;
            if (isGasEnv) {
                return new Promise((resolve, reject) => {
                    google.script.run
                        .withSuccessHandler(res => {
                            try { resolve(typeof res === 'string' ? JSON.parse(res) : res); }
                            catch (e) { resolve(res); }
                        })
                        .withFailureHandler(reject)
                        .executeActionFromRun(actionName, JSON.stringify(params));
                });
            }

            // GitHub Pages などの外部ホスティングから本番の GAS に接続する場合
            // ローカルデバッグ(localhostなど)で、且つ GAS_URL がないか接続を試みない場合はモックへフォールバック
            const isLocalMock = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || !GAS_URL;
            if (!isLocalMock) {
                try {
                    // GASのWebアプリはPOSTに302リダイレクトを返してGETに変換されるため
                    // 最初からGETのURLパラメータ方式で送信する（doGetで処理される）
                    const urlParams = new URLSearchParams({
                        action: actionName,
                        params: JSON.stringify(params)
                    });
                    const response = await fetch(`${GAS_URL}?${urlParams.toString()}`, {
                        method: 'GET',
                        redirect: 'follow'
                    });
                    if (response.ok) {
                        const text = await response.text();
                        try {
                            const res = JSON.parse(text);
                            if (res && res.error) throw new Error(res.error);
                            return res;
                        } catch (jsonErr) {
                            throw new Error('GAS API returned non-JSON: ' + text.substring(0, 200));
                        }
                    }
                    throw new Error(`GAS API HTTP error: ${response.status}`);
                } catch (err) {
                    console.warn("GAS API Request Failed, falling back to mock data: ", err);
                }
            }

            await new Promise(r => setTimeout(r, 600));
            const today = new Date();
            const fmt = d => `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
            if (actionName === 'getLogs') return [
                { timestamp: `${fmt(today)} 07:30:00`, type: '授乳', note: '量: 120ml, 時間: 15分 (メモ: 元気に飲んだ)' },
                { timestamp: `${fmt(today)} 09:00:00`, type: '睡眠', note: '時間: 90分 (メモ: 朝寝)' },
                { timestamp: `${fmt(today)} 12:00:00`, type: '授乳', note: '量: 100ml, 時間: 10分' },
                { timestamp: `${fmt(today)} 15:30:00`, type: '睡眠', note: '時間: 60分 (メモ: 昼寝)' },
                { timestamp: `${fmt(today)} 17:00:00`, type: '授乳', note: '量: 140ml, 時間: 20分' },
            ];
            if (actionName === 'getFacilities') return [
                { name: 'あおぞら中央公園', type: 'park', phone: '03-1234-5678', address: '東京都中央区晴海1-2-3', lat: 35.6562, lng: 139.7752 },
                { name: '中央こどもクリニック', type: 'hospital', phone: '03-3456-7890', address: '東京都港区芝公園4-2-8', lat: 35.6575, lng: 139.748 },
                { name: '渋谷こども広場（児童館）', type: 'community', phone: '03-7777-6666', address: '東京都渋谷区宇田川町1-1', lat: 35.6618, lng: 139.6985 },
                { name: 'キラキラこども園', type: 'daycare', phone: '03-3333-2222', address: '東京都渋谷区恵比寿1-1-1', lat: 35.6467, lng: 139.7101 },
                { name: '渋谷ヒカリエ 赤ちゃん休憩室', type: 'baby_room', phone: '', address: '東京都渋谷区渋谷2-21-1', lat: 35.6585, lng: 139.704 },
            ];
            if (actionName === 'getMilestones') return [
                { id: '1', title: '首がすわった', completed: true, category: '0-3m' },
                { id: '2', title: '声を出して笑う', completed: true, category: '0-3m' },
                { id: '3', title: '追視する', completed: false, category: '0-3m' },
                { id: '4', title: '寝返りができた', completed: false, category: '3-6m' },
                { id: '5', title: 'おもちゃを掴んで口へ運ぶ', completed: false, category: '3-6m' },
                { id: '6', title: 'お座りができる', completed: false, category: '6-9m' },
                { id: '7', title: '走れるようになった', completed: false, category: '2y' },
            ];
            if (actionName === 'getFamilies') return [{ id: 'fam_default', name: 'わが家' }];
            if (actionName === 'getChildren') return [{ id: 'child_1', family_id: 'fam_default', name: 'お子さま', birth_date: '2025-10-15' }]; // Default date for age calc
            if (actionName === 'getSettings') return { feed_interval_hours: '3', sleep_interval_hours: '2', suggest_mode: 'average' };
            if (actionName === 'getSuggestions') return {
                milkMl: [100, 120, 140, 200], milkMin: [10, 15, 20], sleepMin: [30, 60, 90],
                nextFeed: { suggestedAt: fmt(today) + ' 15:00', label: '平均間隔', intervalHours: 3 },
                nextSleep: { suggestedAt: fmt(today) + ' 14:00', label: '平均間隔', intervalHours: 2 },
                settings: { feed_interval_hours: 3, sleep_interval_hours: 2, suggest_mode: 'average' }
            };
            if (actionName === 'getGrowth') return [
                { timestamp: `${fmt(new Date(today.getTime() - 60 * 86400000))} 10:00:00`, height: 62.5, weight: 6.2, head_circumference: 41 },
                { timestamp: `${fmt(new Date(today.getTime() - 30 * 86400000))} 10:00:00`, height: 65.8, weight: 7.1, head_circumference: 42.5 },
                { timestamp: `${fmt(today)} 10:00:00`, height: 68.2, weight: 8.0, head_circumference: 43.8 }
            ];
            if (actionName === 'getNearbyPlaces') return {
                places: [
                    { name: 'ファミリーレストラン・すまいる', address: '東京都中央区晴海1-4-1', phone: '03-9999-8888', lat: 35.6555, lng: 139.7760, type: 'restaurant', source: 'google_places' },
                    { name: 'ベビーズカフェ・ララバイ', address: '東京都中央区晴海2-1-1', phone: '03-8888-7777', lat: 35.6540, lng: 139.7745, type: 'restaurant', source: 'google_places' },
                    { name: 'ベビー＆キッズトイショップ 晴海店', address: '東京都中央区晴海1-2-1', phone: '03-7777-6666', lat: 35.6570, lng: 139.7738, type: 'shop', source: 'google_places' }
                ]
            };
            if (actionName === 'evaluateSymptomAI') return {
                urgency: "【翌日受診】翌日受診推奨",
                urgencyLevel: "info",
                reason: "熱が37.8℃で、機嫌が良く水分も取れている状態であるため。",
                advice: "部屋の温度を調節し、こまめな水分補給を行ってください。熱が上がるか様子を見ましょう。",
                points: ["機嫌や表情に変化がないか", "おしっこはしっかり出ているか", "呼吸が苦しそうでないか"],
                action: "明朝、かかりつけの小児科を受診することをお勧めします。"
            };
            if (actionName === 'searchNearbyFacilities') {
                const base = await runGas('getFacilities');
                return { facilities: (base.facilities || base) || [] };
            }
            if (actionName === 'askGemini') return { reply: 'ローカルモック: 記録データを参照したパーソナライズ回答はGASデプロイ後に有効です。' };
            if (actionName === 'summarizeLogs') return { summary: 'ローカルモック: ログのAI要約サンプルです。' };
            if (actionName === 'saveSettings') return { status: 'success' };
            if (actionName === 'addFamily') return { status: 'success', id: 'fam_new', name: params.name };
            if (actionName === 'addChild') return { status: 'success', id: 'child_new', name: params.name };
            if (actionName === 'hideMilestone') return { status: 'success' };
            if (actionName === 'addMilestone') return { status: 'success', id: '99' };
            if (actionName === 'customizeMilestonesAI') return { status: 'success', added: ['モック項目'], reply: 'AIカスタマイズ（モック）' };
            return { status: 'success' };
        };

        const callGeminiDirectly = async (actionName, params = {}) => {
            const isGasEnv = window.google && google.script && google.script.run;
            // ローカルデバッグ(localhostなど)で、且つ GAS_URL が無いか接続しない場合のみモックを返す
            const isLocalMock = !isGasEnv && (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || !GAS_URL);

            if (isLocalMock) {
                await new Promise(r => setTimeout(r, 800));
                if (actionName === 'getGeminiPromptAndKey') {
                    const lastMsg = params.history?.slice(-1)[0]?.text || params.question || '';
                    return "ローカルモックAI: 相談内容「" + lastMsg + "」に対するパーソナライズ回答です。";
                }
                if (actionName === 'getLogsSummaryPromptAndKey') {
                    return "ローカルモックAI: 最近の記録データに基づく要約です。お子様は順調に成長しています。";
                }
                if (actionName === 'getSymptomPromptAndKey') {
                    return JSON.stringify({
                        urgency: "【翌日受診】翌日受診推奨",
                        urgencyLevel: "info",
                        reason: "熱が37.8℃で、機嫌が良く水分も取れている状態であるため（モック）。",
                        advice: "部屋の温度を調節し、こまめな水分補給を行ってください。熱が上がるか様子を見ましょう。",
                        points: ["機嫌や表情に変化がないか", "おしっこはしっかり出ているか", "呼吸が苦しそうでないか"],
                        action: "明朝、かかりつけの小児科を受診することをお勧めします。"
                    });
                }
                return "モック応答";
            }

            const res = await runGas(actionName, params);
            if (res.error) {
                if (res.error === 'gemini_api_key_not_configured') {
                    // 自動フォールバック
                    res.apiKey = "YOUR_GEMINI_API_KEY";
                } else {
                    throw new Error(res.error);
                }
            }
            if (res.empty) {
                return { empty: true, message: res.message };
            }

            let { prompt, apiKey } = res;
            if (!apiKey) {
                apiKey = "YOUR_GEMINI_API_KEY";
            }
            const models = ["gemini-2.5-flash", "gemini-3.1-flash-lite", "gemini-2.5-flash-lite"];
            let lastError = null;

            // ペイロード構築：AIチャットの場合はマルチターン対応
            let bodyPayload = {};
            if (actionName === 'getGeminiPromptAndKey' && params.history) {
                const contents = [];
                const historyToMap = params.history || [];
                // 最初のメッセージが AI（案内メッセージ）なら除外する
                const startIndex = (historyToMap.length > 0 && historyToMap[0].sender === 'ai') ? 1 : 0;

                for (let i = startIndex; i < historyToMap.length; i++) {
                    const msg = historyToMap[i];
                    contents.push({
                        role: msg.sender === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.text }]
                    });
                }

                bodyPayload = {
                    contents: contents,
                    systemInstruction: {
                        parts: [{ text: prompt }]
                    }
                };
            } else {
                bodyPayload = {
                    contents: [{ role: 'user', parts: [{ text: prompt }] }]
                };
            }

            if (params.base64Image) {
                // If it's single turn, parts array is at contents[0].parts
                // If it's multi-turn, it's at contents[contents.length-1].parts
                const partsTarget = bodyPayload.contents[bodyPayload.contents.length - 1].parts;
                partsTarget.push({
                    inlineData: {
                        mimeType: params.mimeType || "image/jpeg",
                        data: params.base64Image
                    }
                });
            }

            if (actionName === 'getSymptomPromptAndKey' || actionName === 'getLogSuggestionsPromptAndKey' || actionName === 'getOCRAnalysisPromptAndKey' || actionName === 'getRoadmapSuggestionsPromptAndKey') {
                bodyPayload.generationConfig = { responseMimeType: "application/json" };
            }

            for (const model of models) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bodyPayload)
                    });
                    if (response.ok) {
                        const json = await response.json();
                        const reply = json?.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (reply) return reply.trim();
                    } else {
                        const errJson = await response.json().catch(() => ({}));
                        lastError = errJson?.error?.message || `Status ${response.status}`;
                    }
                } catch (e) {
                    lastError = e.message;
                }
            }
            throw new Error(lastError || 'Gemini API呼び出しに失敗しました。');
        };

        const toDatetimeLocalValue = (d = new Date()) => {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const toDateValue = (d = new Date()) => {
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        };

        const toTimeValue = (d = new Date()) => {
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };

        const combineDateTimeToJst = (dateStr, timeStr) => {
            if (!dateStr || !timeStr) return null;
            return `${dateStr.replace(/-/g, '/')} ${timeStr}:00`;
        };

        const datetimeLocalToJst = (val) => {
            if (!val) return null;
            const d = new Date(val);
            if (isNaN(d.getTime())) return null;
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
        };

        const formatSuggestTime = (s) => {
            if (!s) return '—';
            const m = String(s).match(/(\d{4}\/\d{2}\/\d{2})\s+(\d{2}:\d{2})/);
            return m ? `${m[1]} ${m[2]}` : s;
        };

        // ============================================================
        // ヘルパー：今日のログを集計
        // ============================================================
        const calcTodayTotals = (logs) => {
            const now = new Date();
            let milkMl = 0, sleepMin = 0;
            logs.forEach(log => {
                if (!log.timestamp) return;
                const logDate = new Date(log.timestamp);
                if (isNaN(logDate.getTime())) return;

                const isToday = logDate.getFullYear() === now.getFullYear() &&
                    logDate.getMonth() === now.getMonth() &&
                    logDate.getDate() === now.getDate();
                if (!isToday) return;

                const noteMatch = s => {
                    const m = String(log.note).match(new RegExp(s + ':\\s*(\\d+)'));
                    return m ? parseInt(m[1], 10) : 0;
                };
                if (log.type === '授乳') milkMl += noteMatch('量');
                if (log.type === '睡眠') sleepMin += noteMatch('時間');
            });
            return { milkMl, sleepMin };
        };

        // ============================================================
        // SVG Icons
        // ============================================================
        const Icon = {
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>,
            Milestone: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8.56 2.9A7 7 0 1 1 2.06 9.27" /><path d="M2 2h5v5" /><path d="m12 12 4 4" /><circle cx="12" cy="12" r="1" /></svg>,
            Chat: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>,
            Camera: ({ className = "" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Sparkles: ({ className = "" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /></svg>,

        // ============================================================

        const FacilityMap = ({ facilities, userLocation, selectedFacility, onRequestGPS, gpsLoading }) => {

        // ============================================================
        // SVG Growth Chart Component
        // ============================================================
        const GrowthChart = ({ data }) => {
            if (!data || data.length === 0) {
                return <div className="text-center py-10 text-slate-400 text-sm border border-dashed border-slate-200 rounded-2xl">成長データがまだありません</div>;
            }

            const sorted = [...data].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const heights = sorted.map(d => parseFloat(d.height)).filter(h => !isNaN(h));
            const weights = sorted.map(d => parseFloat(d.weight)).filter(w => !isNaN(w));

            if (heights.length === 0 && weights.length === 0) {
                return <div className="text-center py-10 text-slate-400 text-sm border border-dashed border-slate-200 rounded-2xl">有効な身長・体重データがありません</div>;
            }

            const minH = heights.length ? Math.min(...heights) - 3 : 50;
            const maxH = heights.length ? Math.max(...heights) + 3 : 90;
            const minW = weights.length ? Math.min(...weights) - 1 : 3;
            const maxW = weights.length ? Math.max(...weights) + 1 : 15;

            const width = 340;
            const height = 180;
            const padding = 30;

            const getX = (idx) => padding + (idx * (width - padding * 2) / Math.max(1, sorted.length - 1));
            const getY = (val, min, max) => height - padding - ((val - min) * (height - padding * 2) / Math.max(1, max - min));

            const heightPoints = sorted.map((d, i) => d.height ? `${getX(i)},${getY(parseFloat(d.height), minH, maxH)}` : '').filter(Boolean).join(' ');
            const weightPoints = sorted.map((d, i) => d.weight ? `${getX(i)},${getY(parseFloat(d.weight), minW, maxW)}` : '').filter(Boolean).join(' ');

            return (
                <div className="bg-white/90 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
                    <div className="flex justify-between items-center text-[10px]">
                        <span className="flex items-center space-x-1"><span className="w-3.5 h-1 bg-indigo-500 rounded-full inline-block" /> <span className="font-bold text-slate-600">身長 (左軸: cm)</span></span>
                        <span className="flex items-center space-x-1"><span className="w-3.5 h-1 bg-emerald-500 rounded-full inline-block" /> <span className="font-bold text-slate-600">体重 (右軸: kg)</span></span>
                    </div>
                    <div className="relative">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
                                const y = padding + ratio * (height - padding * 2);
                                const hVal = Math.round((maxH - (ratio * (maxH - minH))) * 10) / 10;
                                const wVal = Math.round((maxW - (ratio * (maxW - minW))) * 10) / 10;
                                return (
                                    <g key={idx}>
                                        <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#f1f5f9" strokeWidth="1" />
                                        <text x={padding - 6} y={y + 3} textAnchor="end" className="text-[9px] fill-indigo-400 font-bold font-mono">{hVal}</text>
                                        <text x={width - padding + 6} y={y + 3} textAnchor="start" className="text-[9px] fill-emerald-500 font-bold font-mono">{wVal}</text>
                                    </g>
                                );
                            })}
                            {sorted.map((d, i) => {
                                const x = getX(i);
                                const m = d.timestamp.match(/\/(\d{2}\/\d{2})/);
                                const dateStr = m ? m[1] : '';
                                return (
                                    <text key={i} x={x} y={height - 8} textAnchor="middle" className="text-[8px] fill-slate-400 font-bold font-mono">{dateStr}</text>
                                );
                            })}
                            {heightPoints && (
                                <polyline fill="none" stroke="#6366f1" strokeWidth="3" points={heightPoints} className="chart-line" strokeLinecap="round" strokeLinejoin="round" />
                            )}
                            {weightPoints && (
                                <polyline fill="none" stroke="#10b981" strokeWidth="3" points={weightPoints} className="chart-line" strokeLinecap="round" strokeLinejoin="round" />
                            )}
                            {sorted.map((d, i) => {
                                const x = getX(i);
                                const yH = d.height ? getY(parseFloat(d.height), minH, maxH) : null;
                                const yW = d.weight ? getY(parseFloat(d.weight), minW, maxW) : null;
                                return (
                                    <g key={i}>
                                        {yH !== null && (
                                            <circle cx={x} cy={yH} r="4.5" fill="#6366f1" stroke="white" strokeWidth="2" className="hover:scale-150 transition-all cursor-pointer">
                                                <title>{`身長: ${d.height}cm\n測定日: ${d.timestamp}`}</title>
                                            </circle>
                                        )}
                                        {yW !== null && (
                                            <circle cx={x} cy={yW} r="4.5" fill="#10b981" stroke="white" strokeWidth="2" className="hover:scale-150 transition-all cursor-pointer">
                                                <title>{`体重: ${d.weight}kg\n測定日: ${d.timestamp}`}</title>
                                            </circle>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        };

        // ============================================================
        // Main App
        // ============================================================
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [logs, setLogs] = React.useState([]);
            const [facilities, setFacilities] = React.useState([]);
            const [milestones, setMilestones] = React.useState([]);
            const [families, setFamilies] = React.useState([]);
            const [children, setChildren] = React.useState([]);
            const [familyId, setFamilyId] = React.useState(localStorage.getItem('active_family_id') || 'fam_default');
            const [childId, setChildId] = React.useState(localStorage.getItem('active_child_id') || 'child_1');
            const [growthDate, setGrowthDate] = React.useState(toDateValue());
            const [growthTime, setGrowthTime] = React.useState(toTimeValue());
            const [suggestions, setSuggestions] = React.useState(null);
            const [showSettings, setShowSettings] = React.useState(false);
            const [settingsForm, setSettingsForm] = React.useState({ feed_interval_hours: 3, sleep_interval_hours: 2, suggest_mode: 'average' });
            const [newFamilyName, setNewFamilyName] = React.useState('');
            const [newChildName, setNewChildName] = React.useState('');
            const [newChildBirth, setNewChildBirth] = React.useState('');
            const [newMilestoneTitle, setNewMilestoneTitle] = React.useState('');
            const [milestoneAiPrompt, setMilestoneAiPrompt] = React.useState('');
            const [milestoneAiLoading, setMilestoneAiLoading] = React.useState(false);

            // Google認証・家族連携用ステート
            const [googleClientId, setGoogleClientId] = React.useState(GOOGLE_CLIENT_ID || localStorage.getItem('google_client_id') || '');
            const safeGetEmail = () => {
                const e = localStorage.getItem('user_email');
                if (e === 'undefined' || e === 'null') return '';
                return e || '';
            };
            const [userEmail, setUserEmail] = React.useState(safeGetEmail());
            const [authError, setAuthError] = React.useState(null);
            const [globalLoading, setGlobalLoading] = React.useState(false);
            const [roadmapTasks, setRoadmapTasks] = React.useState(() => {
                try { return JSON.parse(localStorage.getItem('roadmapTasks')) || {}; }
                catch(e) { return {}; }
            });
            const [showAllRoadmaps, setShowAllRoadmaps] = React.useState(false);

            const formatAge = (months) => {
                if (months === null) return '生年月日未設定';
                const y = Math.floor(months / 12);
                const m = months % 12;
                if (y > 0) return `${y}歳${m > 0 ? `${m}ヶ月` : ''}`;
                return `${months}ヶ月`;
            };

            const toggleRoadmapTask = (taskId) => {
                const updated = { ...roadmapTasks, [taskId]: !roadmapTasks[taskId] };
                setRoadmapTasks(updated);
                localStorage.setItem('roadmapTasks', JSON.stringify(updated));
            };

            // JWTデコード用ヘルパー
            const parseJwt = (token) => {
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                } catch (e) {
                    console.error("JWT parse error:", e);
                    return null;
                }
            };

            // ログイン成功時のコールバック
            const handleCredentialResponse = (response) => {
                try {
                    const payload = parseJwt(response.credential);
                    if (payload && payload.email) {
                        const email = payload.email.toLowerCase();
                        setUserEmail(email);
                        localStorage.setItem('user_email', email);
                        localStorage.setItem('google_user_name', payload.name || '');
                        localStorage.setItem('google_user_picture', payload.picture || '');
                        setAuthError(null);
                        loadAllData(null, email);
                    } else {
                        setAuthError("Google ログインに失敗しました。無効な認証情報です。");
                    }
                } catch (e) {
                    console.error("Credential response parsing error:", e);
                    setAuthError("ログイン処理中にエラーが発生しました。");
                }
            };

            // ログアウト処理
            const handleLogout = () => {
                setUserEmail('');
                localStorage.removeItem('user_email');
                localStorage.removeItem('google_user_name');
                localStorage.removeItem('google_user_picture');
                setFamilyId('fam_default');
                setChildId('child_1');
            };

            // Google Identity Services初期化とログインボタン描画の監視
            React.useEffect(() => {
                if (userEmail || !googleClientId) return;

                let timer = null;
                let attempts = 0;
                const MAX_ATTEMPTS = 20; // 500ms x 20 = 10秒

                const initGis = () => {
                    attempts++;
                    // window.googleを明示的に参照（BabelトランスパイルやGAS環境でのシャドウイング回避）
                    const goog = window.google;
                    if (
                        goog &&
                        goog.accounts &&
                        goog.accounts.id
                    ) {
                        if (timer) { clearInterval(timer); timer = null; }
                        try {
                            goog.accounts.id.initialize({
                                client_id: googleClientId,
                                callback: handleCredentialResponse,
                                auto_select: false
                            });
                            const btnEl = document.getElementById("google-signin-btn");
                            if (btnEl) {
                                goog.accounts.id.renderButton(btnEl, {
                                    theme: "outline", size: "large", width: 280, shape: "pill"
                                });
                            }
                            return true; // 成功
                        } catch (err) {
                            console.error("GIS initialization error:", err);
                            // エラーが起きても成功フラグは返さない（タイマーは既にクリア済み）
                        }
                    } else if (attempts >= MAX_ATTEMPTS) {
                        // 10秒経っても初期化できなければ諦める
                        if (timer) { clearInterval(timer); timer = null; }
                        console.warn("GIS: google.accounts.id could not be loaded after 10s");
                    }
                    return false;
                };

                // 即試行し、失敗したらポーリング
                if (!initGis()) {
                    timer = setInterval(initGis, 500);
                }

                return () => { if (timer) clearInterval(timer); };
            }, [googleClientId, userEmail]);


            const [familyMembers, setFamilyMembers] = React.useState([]);
            const [newMemberEmail, setNewMemberEmail] = React.useState('');
            const [memberLoading, setMemberLoading] = React.useState(false);

            // 編集用の一時ステート
            const [editingFamilyId, setEditingFamilyId] = React.useState(null);
            const [editingFamilyName, setEditingFamilyName] = React.useState('');

            // タイムアウト保証付き fetch ヘルパー (AbortSignal.timeout 非対応ブラウザ用)
            const fetchWithTimeout = async (url, options = {}, timeoutMs = 10000) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(id);
                    return response;
                } catch (error) {
                    clearTimeout(id);
                    throw error;
                }
            };

            // ブラウザから直接 Overpass API を叩く（GASの6秒タイムアウト回避）
            // カテゴリ別にクエリを分割して公園が飲食店に埋もれることを防ぐ
            const fetchOverpassDirectly = async (lat, lng, radius = 1500) => {
                // localStorage キャッシュの導入 (緯度経度を小数点以下3桁＝約110m四方に丸める)
                const roundLat = parseFloat(lat.toFixed(3));
                const roundLng = parseFloat(lng.toFixed(3));
                const cacheKey = `childcompass_facs_${roundLat}_${roundLng}`;

                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const { data, timestamp } = JSON.parse(cached);
                        // キャッシュ有効期間を24時間(86,400,000ミリ秒)とする
                        if (Date.now() - timestamp < 86400000) {
                            console.log("お出かけ施設検索: キャッシュヒット", roundLat, roundLng);
                            return data;
                        }
                    } catch (e) {
                        localStorage.removeItem(cacheKey);
                    }
                }

                // 公園・緑地系（way中心なので上限を多めに）
                const queryParks = `[out:json][timeout:15];
(
  node["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
  way["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
  relation["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
);
out center 30;`;

                // 子育て施設系（児童館・保育園・授乳室）
                const queryCommunity = `[out:json][timeout:15];
(
  node["amenity"~"^(community_centre|childcare|kindergarten|social_facility)"](around:${radius},${lat},${lng});
  way["amenity"~"^(community_centre|childcare|kindergarten|social_facility)"](around:${radius},${lat},${lng});
  node["amenity"="toilets"]["changing_table"="yes"](around:${radius},${lat},${lng});
  node["amenity"="baby_hatch"](around:${radius},${lat},${lng});
  node["amenity"~"^(hospital|clinic|doctors)"](around:${radius},${lat},${lng});
  way["amenity"~"^(hospital|clinic|doctors)"](around:${radius},${lat},${lng});
);
out center 20;`;

                // 飲食店・ショップ系
                const queryEats = `[out:json][timeout:15];
(
  node["amenity"~"^(restaurant|cafe|fast_food)"](around:${radius},${lat},${lng});
  way["amenity"~"^(restaurant|cafe|fast_food)"](around:${radius},${lat},${lng});
  node["shop"~"^(toys|baby_goods|clothes|mall|supermarket|convenience)"](around:${radius},${lat},${lng});
  way["shop"~"^(toys|baby_goods|clothes|mall|supermarket|convenience)"](around:${radius},${lat},${lng});
);
out center 20;`;

                const endpoints = [
                    'https://overpass-api.de/api/interpreter',
                    'https://overpass.kumi.systems/api/interpreter',
                ];

                // 複数エンドポイントへ同時にリクエストを送り、一番早い成功応答を採用する (Race 方式)
                const runQuery = async (query) => {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 12000); // 12秒全体タイムアウト保護

                    const promises = endpoints.map(endpoint => {
                        return new Promise(async (resolve, reject) => {
                            try {
                                const resp = await fetchWithTimeout(endpoint, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                    body: 'data=' + encodeURIComponent(query),
                                    signal: controller.signal
                                }, 12000);
                                if (resp.ok) {
                                    const json = await resp.json();
                                    resolve(json.elements || []);
                                } else {
                                    reject(new Error(`Overpass Status ${resp.status}`));
                                }
                            } catch (err) {
                                reject(err);
                            }
                        });
                    });

                    try {
                        const result = await Promise.any(promises);
                        clearTimeout(timeoutId);
                        return result;
                    } catch (err) {
                        console.warn('Overpass Race Query failed/timed out, falling back to sequential check', err);
                        clearTimeout(timeoutId);
                        // Promise.any が失敗または非サポートブラウザの場合の逐次フォールバック
                        for (const endpoint of endpoints) {
                            try {
                                const resp = await fetchWithTimeout(endpoint, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                    body: 'data=' + encodeURIComponent(query)
                                }, 10000);
                                if (resp.ok) {
                                    const json = await resp.json();
                                    return json.elements || [];
                                }
                            } catch (e) {
                                console.warn('Fallback sequential attempt failed for:', endpoint);
                            }
                        }
                        return [];
                    }
                };

                const parseElement = (el) => {
                    const tags = el.tags || {};
                    const name = tags.name || tags['name:ja'] || tags.operator;
                    if (!name) return null;

                    let elLat = el.lat, elLng = el.lon;
                    if ((elLat == null || elLng == null) && el.center) {
                        elLat = el.center.lat; elLng = el.center.lon;
                    }
                    if (elLat == null || elLng == null) return null;

                    const addrParts = [
                        tags['addr:province'] || tags['addr:state'],
                        tags['addr:city'],
                        tags['addr:suburb'],
                        tags['addr:quarter'],
                        tags['addr:housenumber'],
                    ].filter(Boolean);
                    const address = tags['addr:full'] || addrParts.join('') || '住所情報なし';
                    const phone = tags.phone || tags['contact:phone'] || '';

                    const leisure = tags.leisure || '';
                    const amenity = tags.amenity || '';
                    const shop = tags.shop || '';
                    let type = 'shop';
                    if (leisure === 'playground' || leisure === 'park') type = 'park';
                    else if (['community_centre', 'childcare', 'kindergarten', 'social_facility'].includes(amenity)) type = 'community';
                    else if (['restaurant', 'cafe', 'fast_food'].includes(amenity)) type = 'restaurant';
                    else if (['hospital', 'clinic', 'doctors'].includes(amenity)) type = 'hospital';
                    else if (amenity === 'toilets' || amenity === 'baby_hatch') type = 'baby_room';
                    else if (shop) type = 'shop';

                    const childFriendlyTags = [];
                    if (tags['changing_table'] === 'yes') childFriendlyTags.push('おむつ替えあり');
                    if (tags['highchair'] === 'yes' || tags['highchair'] === 'provided') childFriendlyTags.push('ハイチェアあり');
                    if (tags['baby_room'] === 'yes') childFriendlyTags.push('授乳室あり');
                    if (tags['playground'] === 'yes' || leisure === 'playground') childFriendlyTags.push('遊具あり');
                    if (tags['children'] === 'yes' || tags['kids_area'] === 'yes') childFriendlyTags.push('キッズスペースあり');
                    if (tags['stroller'] === 'yes' || tags['wheelchair'] === 'yes') childFriendlyTags.push('ベビーカーOK');

                    return { name, address, phone, lat: elLat, lng: elLng, type, childFriendlyTags, source: 'openstreetmap' };
                };

                // 3クエリを並列実行してマージ（IDで重複排除）
                const [parksElems, communityElems, eatsElems] = await Promise.all([
                    runQuery(queryParks),
                    runQuery(queryCommunity),
                    runQuery(queryEats),
                ]);

                const allElems = [...parksElems, ...communityElems, ...eatsElems];
                const seen = new Set();
                const places = [];
                for (const el of allElems) {
                    const key = `${el.type}:${el.id || el.name}`;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    const parsed = parseElement(el);
                    if (parsed) places.push(parsed);
                }

                // キャッシュへ保存
                try {
                    localStorage.setItem(cacheKey, JSON.stringify({
                        data: places,
                        timestamp: Date.now()
                    }));
                } catch (e) {
                    console.error("Cache save error:", e);
                }

                return places;
            };

                    const base64Data = ev.target.result.split(',')[1];
                    const mimeType = file.type;

                    if (tabContext === 'log') setLogLoading(true);
                    else if (tabContext === 'growth') setGrowthLoading(true);

                    try {
                        const reply = await callGeminiDirectly('getOCRAnalysisPromptAndKey', {
                            base64Image: base64Data,
                            mimeType: mimeType
                        });
                        let parsedData = null;
                        let rawReply = reply;
                        try {
                            const cleaned = reply.replace(/```json/g, '').replace(/```/g, '').trim();
                            parsedData = JSON.parse(cleaned);
                        } catch (err) {
                            console.error('OCR JSON Parse Error:', err);
                        }

                        if (parsedData) {
                            if (tabContext === 'log') {
                                if (parsedData.type && ['授乳', '睡眠', '食事', 'おむつ', '体調', 'その他'].includes(parsedData.type)) {
                                    setLogType(parsedData.type);
                                }
                                if (parsedData.ml != null) setMilkMl(Number(parsedData.ml));
                                if (parsedData.minutes != null) {
                                    if (parsedData.type === '睡眠') setSleepMin(Number(parsedData.minutes));

                                }
                                if (parsedData.temperature != null) setSymptomTemp(Number(parsedData.temperature));
                                if (parsedData.note) setLogNote(parsedData.note);
                            } else if (tabContext === 'growth') {
                                if (parsedData.height != null) setGrowthHeight(String(parsedData.height));
                                if (parsedData.weight != null) setGrowthWeight(String(parsedData.weight));
                                if (parsedData.head != null) setGrowthHead(String(parsedData.head));
                            }
                        } else {
                            // Fallback: Dump raw text to note
                            if (tabContext === 'log') {
                                setLogType('その他');
                                setLogNote(rawReply);
                            }
                            alert('自動解析の形式が一部崩れました。読み取れたテキストをメモ欄に入力しました。');
                        }
                    } catch (err) {
                        console.error('OCR API Error:', err);
                        alert('通信エラーまたは解析に失敗しました。');
                    } finally {
                        if (tabContext === 'log') setLogLoading(false);

                                                </div>
                                                <div className="pt-2 border-t border-black/5 flex items-start space-x-1.5 font-bold">
                                                    <span>👉 推奨行動:</span>
                                                    <span>{triageResult.action}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* 右カラム：緊急小児科リスト */}
                                <div className="lg:col-span-6 space-y-4">
                                    <div className="bg-white/80 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
                                        <h3 className="font-bold text-slate-800 text-xs uppercase tracking-wider">近隣の小児科・緊急外来（優先表示）</h3>
                                        <div className="space-y-2">
                                            {facilities.filter(f => f.type === 'hospital').length === 0
                                                ? <p className="text-xs text-slate-400">現在地から病院の検索を行ってください（お出かけタブの「現在地」ボタンで更新できます）。</p>
                                                : facilities.filter(f => f.type === 'hospital').slice(0, 3).map((f, idx) => {
                                                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.name + ' ' + f.address)}`;
                                                    return (
                                                        <div key={idx} className="flex justify-between items-center bg-slate-50 border border-slate-200/60 rounded-xl p-3 text-xs">
                                                            <div className="min-w-0 flex-1">
                                                                <h4 className="font-bold text-slate-800 truncate">{f.name}</h4>
                                                                <p className="text-[10px] text-slate-500 truncate mt-0.5">{f.address}</p>
                                                            </div>
                                                            <div className="flex space-x-1 shrink-0 ml-2">
                                                                {f.phone && (
                                                                    <button
                                                                        onClick={() => setCallConfirm({
                                                                            number: f.phone,
                                                                            label: f.name,
                                                                            emoji: '🏥',
                                                                            description: '救急・夜間対応の医療機関です。事前に受入体制や診察時間をご確認ください。'
                                                                        })}
                                                                        className="p-1.5 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-100 active:scale-95 transition-all"
                                                                    >
                                                                        📞
                                                                    </button>
                                                                )}
                                                                <a href={mapsUrl} target="_blank" className="p-1.5 bg-green-50 border border-green-100 text-green-600 rounded-lg">🗺</a>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            }
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ======================== MILESTONES ======================== */}
                        {activeTab === 'milestones' && (
                            <div className="space-y-3 animate-fade-in">
                                <div className="bg-white/80 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
                                    <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">成長マイルストーン</h2>
                                    <p className="text-slate-400 text-xs">達成したらタップ。長押し相当の「非表示」でリストから隠せます。Geminiで発達に合わせて追加も可能です。</p>
                                    <div className="flex gap-2">
                                        <input value={newMilestoneTitle} onChange={e => setNewMilestoneTitle(e.target.value)} placeholder="自分で追加…"
                                            className="flex-1 bg-slate-50 border rounded-xl px-3 py-2 text-sm" />
                                        <button type="button" onClick={handleAddMilestone} className="px-3 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl shrink-0">追加</button>
                                    </div>
                                    <div>
                                        <input value={milestoneAiPrompt} onChange={e => setMilestoneAiPrompt(e.target.value)} placeholder="AIに相談: 例）7ヶ月の発達で追加して"
                                            className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm mb-2" />
                                        <button type="button" onClick={handleMilestoneAI} disabled={milestoneAiLoading}
                                            className="w-full py-2 bg-violet-600 text-white text-xs font-bold rounded-xl disabled:opacity-50">
                                            {milestoneAiLoading ? 'AIが提案中…' : '✨ Geminiでマイルストーンをカスタマイズ'}
                                        </button>
                                    </div>
                                    <div className="mt-2 flex items-center space-x-3">
                                        <div className="flex items-center space-x-1">
                                            <div className="w-2.5 h-2.5 rounded-full bg-indigo-500" />
                                            <span className="text-[11px] text-slate-500">達成済み {milestones.filter(m => m.completed).length}件</span>
                                        </div>
                                        <div className="flex items-center space-x-1">
                                            <div className="w-2.5 h-2.5 rounded-full bg-slate-200" />
                                            <span className="text-[11px] text-slate-500">未達成 {milestones.filter(m => !m.completed).length}件</span>
                                        </div>
                                    </div>
                                </div>

                                {MILESTONE_CATEGORIES.map(cat => {
                                    const catItems = milestones.filter(m => m.category === cat.key);
                                    if (catItems.length === 0) return null;
                                    const c = CAT_COLORS[cat.color];
                                    const completedCount = catItems.filter(m => m.completed).length;
                                    const isOpen = openCats[cat.key] !== false;
                                    return (
                                        <div key={cat.key} className={`border ${c.border} rounded-2xl overflow-hidden shadow-sm`}>
                                            <button onClick={() => toggleCat(cat.key)}
                                                className={`w-full flex items-center justify-between px-4 py-3 ${c.bg} transition-colors`}>
                                                <div className="flex items-center space-x-2">
                                                    <span className="text-lg">{cat.emoji}</span>
                                                    <div className="text-left">
                                                        <div className={`text-sm font-bold ${c.text}`}>{cat.label}</div>
                                                        <div className="text-[10px] text-slate-500">{completedCount}/{catItems.length} 達成</div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center space-x-2">
                                                    <div className="w-16 h-1.5 bg-white/60 rounded-full overflow-hidden">
                                                        <div className={`h-full ${c.dot} rounded-full transition-all`} style={{ width: `${catItems.length ? (completedCount / catItems.length) * 100 : 0}%` }} />
                                                    </div>
                                                    <div className={`transition-transform ${isOpen ? 'rotate-180' : ''} ${c.text}`}>
                                                        <Icon.ChevronDown />
                                                    </div>
                                                </div>
                                            </button>
                                            <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                                <div className="divide-y divide-slate-100">
                                                    {catItems.map(m => (
                                                        <div key={m.id} className={`flex items-center ${m.completed ? 'bg-indigo-50/60' : 'bg-white'}`}>
                                                            <button onClick={() => handleToggleMilestone(m.id)}
                                                                className="flex-1 flex items-center justify-between px-4 py-3 text-left hover:bg-slate-50">
                                                                <div className="flex items-center space-x-3">
                                                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${m.completed ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300 bg-white'}`}>
                                                                        {m.completed && (
                                                                            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4"><polyline points="20 6 9 17 4 12" /></svg>
                                                                        )}
                                                                    </div>
                                                                    <span className={`text-sm ${m.completed ? 'text-indigo-800 font-semibold line-through' : 'text-slate-700 font-medium'}`}>{m.title}</span>
                                                                </div>
                                                                {m.completed && <span className="text-lg">🎉</span>}
                                                            </button>
                                                            <button type="button" onClick={e => handleHideMilestone(m.id, e)} title="非表示"
                                                                className="px-3 py-3 text-slate-300 hover:text-rose-500 text-xs">✕</button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ======================== AI CONSULTING ======================== */}
                        {activeTab === 'ai-consult' && (
                            <div className="flex flex-col bg-white/80 border border-slate-100 rounded-2xl shadow-sm overflow-hidden animate-fade-in" style={{ height: '70vh' }}>
                                <div className="bg-indigo-50 border-b border-indigo-100 px-3 py-2 text-[10px] leading-snug">
                                    <p className="text-indigo-700 font-bold">
                                        記録・成長履歴・月齢・マイルストーン情報を参照してパーソナライズ回答します。
                                    </p>
                                    <p className="text-slate-500 mt-0.5">
                                        ⚠️ 免責: AIによる助言は小児科医の診察に代わるものではありません。緊急時は速やかに受診してください。
                                    </p>
                                </div>
                                {/* Quick chips */}
                                <div className="px-3 py-2 bg-slate-50 border-b border-slate-100 flex space-x-1.5 overflow-x-auto custom-scrollbar shrink-0">
                                    {['夜泣き対策は？', '離乳食の進め方', '発熱時の対応', 'ミルクの量の目安'].map((q, idx) => (
                                        <button key={idx} onClick={e => handleSendChat(e, q)} disabled={chatLoading}
                                            className="whitespace-nowrap px-3 py-1 bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-700 text-xs font-semibold rounded-full shadow-sm transition-all">
                                            {q}
                                        </button>
                                    ))}
                                </div>

                                {/* Messages */}
                                <div className="flex-1 p-4 overflow-y-auto space-y-3 custom-scrollbar">
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} className={`max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed ${msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-tr-none ml-auto shadow-md' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'}`}>
                                            {msg.text}
                                        </div>
                                    ))}
                                    {chatLoading && (
                                        <div className="flex space-x-1.5 bg-slate-100 p-3 rounded-2xl rounded-tl-none w-16 border border-slate-200">
                                            {[0, 1, 2].map(i => <span key={i} className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: `${i * 0.15}s` }} />)}
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* Input */}
                                <form onSubmit={handleSendChat} className="p-3 border-t border-slate-100 bg-white flex space-x-2 shrink-0">
                                    <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)}
                                        placeholder="AI相談員に質問する…"
                                        disabled={chatLoading}
                                        className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 transition-all" />
                                    <button type="submit" disabled={chatLoading || !chatInput.trim()}
                                        className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white text-sm font-bold rounded-xl shadow-md shadow-indigo-100 transition-all">
                                        送信
                                    </button>
                                </form>
                            </div>
                        )}

                    </main>

                    {/* Bottom Tab Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white/85 backdrop-blur-md border-t border-slate-100 shadow-lg max-w-md mx-auto md:max-w-3xl lg:max-w-none">
                        <div className="flex justify-around items-center py-2 px-1">
                            {[
                                { id: 'dashboard', label: '記録', icon: <Icon.Home /> },
                                { id: 'growth', label: '成長', icon: <Icon.Chart /> },
                                { id: 'facilities', label: 'お出かけ', icon: <Icon.Search /> },
                                { id: 'roadmap', label: 'ロードマップ', icon: <Icon.Roadmap /> },
                                { id: 'emergency', label: '緊急', icon: <Icon.Emergency /> },
                                { id: 'ai-consult', label: 'AI相談', icon: <Icon.Chat /> },
                            ].map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                    className={`flex flex-col items-center justify-center py-2 px-0.5 rounded-xl transition-all flex-1 min-w-0 ${activeTab === tab.id ? 'text-indigo-600 scale-105 bg-indigo-50/50 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {tab.icon}
                                    <span className="text-[8px] mt-0.5 font-semibold leading-tight truncate w-full text-center">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* 電話発信確認モーダル */}
                    {callConfirm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 transform scale-100 transition-all space-y-4 animate-scale-up">
                                <div className="flex flex-col items-center text-center space-y-3">
                                    <div className="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-3xl shadow-inner">
                                        {callConfirm.emoji || '📞'}
                                    </div>
                                    <div className="space-y-1">
                                        <h3 className="text-base font-bold text-slate-800 leading-snug">{callConfirm.label}</h3>
                                        <p className="text-xl font-extrabold text-indigo-600 tracking-wider font-mono mt-0.5">{callConfirm.number}</p>
                                    </div>
                                    <p className="text-xs text-slate-500 leading-relaxed bg-slate-50 p-3 rounded-2xl border border-slate-100/50 w-full">
                                        {callConfirm.description || 'この番号に電話をかけますか？'}
                                    </p>
                                </div>
                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    <button
                                        type="button"
                                        onClick={() => setCallConfirm(null)}
                                        className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all text-sm active:scale-95"
                                    >
                                        キャンセル
                                    </button>
                                    <a
                                        href={`tel:${callConfirm.number}`}
                                        onClick={() => setCallConfirm(null)}
                                        className={`py-3 text-center text-white font-bold rounded-2xl transition-all text-sm active:scale-95 shadow-md flex items-center justify-center ${callConfirm.number === '119'
                                                ? 'bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 shadow-red-100'
                                                : 'bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 shadow-indigo-100'
                                            }`}
                                    >
                                        発信する
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* 更新中ローディングオーバーレイ */}
                    {globalLoading && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center animate-fade-in pointer-events-auto">
                            <div className="bg-white/95 p-6 rounded-3xl shadow-2xl border border-slate-100 flex flex-col items-center space-y-4">
                                <div className="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                                <p className="text-xs font-bold text-slate-700 tracking-wider">更新中...</p>
                            </div>
                        </div>
                    )}

                    {/* All Logs Modal */}
                    {showAllLogs && (
                        <div className="fixed inset-0 z-50 flex flex-col bg-white animate-fade-in">
                            <div className="flex-none pt-safe bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
                                <h2 className="text-sm font-bold text-slate-800">すべての履歴</h2>
                                <button onClick={() => setShowAllLogs(false)} className="p-2 bg-slate-100 text-slate-600 rounded-full hover:bg-slate-200 transition-colors">
                                    <Icon.X />
                                </button>
                            </div>
                            <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3 pb-safe-bottom bg-slate-50/30">
                                {logs.length === 0 ? (
                                    <div className="text-center py-8 text-slate-400 text-sm">ログがありません</div>
                                ) : (
                                    [...logs].reverse().map((item, idx) => (
                                        <div key={item.id || idx} className="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm flex flex-col space-y-2">
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center space-x-2">
                                                    <span className={`px-2 py-0.5 text-[10px] font-bold rounded-md border ${getTypeColor(item.type)}`}>{item.type}</span>
                                                    <span className="text-xs text-slate-500 font-mono">{item.timestamp}</span>
                                                </div>
                                                <div className="flex items-center space-x-3">
                                                    <button onClick={() => {
                                                        const ts = item.timestamp; // e.g. "2026/06/19 10:00:00"
                                                        let dStr = '';
                                                        let tStr = '';
                                                        if (ts && ts.includes(' ')) {
                                                            const [dPart, tPart] = ts.split(' ');
                                                            dStr = dPart.replace(/\//g, '-');
                                                            tStr = tPart.substring(0, 5);
                                                        } else {
                                                            const d = new Date();
                                                            const pad = (n) => n.toString().padStart(2, '0');
                                                            dStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
                                                            tStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
                                                        }
                                                        setEditingLog({
                                                            oldTimestamp: item.timestamp,
                                                            oldType: item.type,
                                                            date: dStr,
                                                            time: tStr,
                                                            type: item.type,
                                                            note: item.note || ''
                                                        });
                                                    }} className="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors px-2 py-1 rounded-lg hover:bg-indigo-50">編集</button>
                                                    <button onClick={() => handleDeleteLog(item)} disabled={deletingLogId === (item.timestamp + item.type)} className="text-xs font-bold text-rose-600 hover:text-rose-800 transition-colors px-2 py-1 rounded-lg hover:bg-rose-50 disabled:opacity-50">
                                                        {deletingLogId === (item.timestamp + item.type) ? '削除中...' : '削除'}
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="text-slate-800 text-sm leading-snug whitespace-pre-wrap">{item.note}</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* Edit Log Modal */}
                    {editingLog && (
                        <div className="fixed inset-0 z-[60] bg-black/40 flex items-center justify-center p-4 animate-fade-in" onClick={() => setEditingLog(null)}>
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl space-y-4" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                    <h3 className="font-bold text-slate-800 text-sm">履歴の編集</h3>
                                    <button onClick={() => setEditingLog(null)} className="text-slate-400 hover:text-slate-600 text-lg">✕</button>
                                </div>
                                <form onSubmit={handleEditLogSubmit} className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">日時</label>
                                        <div className="flex space-x-2">
                                            <input type="date" value={editingLog.date} onChange={e => setEditingLog({...editingLog, date: e.target.value})}
                                                className="w-1/2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" required />
                                            <input type="time" value={editingLog.time} onChange={e => setEditingLog({...editingLog, time: e.target.value})}
                                                className="w-1/2 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" required />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">種類</label>
                                        <select value={editingLog.type} onChange={e => setEditingLog({...editingLog, type: e.target.value})}
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-semibold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300" required>
                                            {['授乳', '睡眠', '食事', 'おむつ', '体調', 'その他'].map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">メモ・詳細</label>
                                        <textarea value={editingLog.note} onChange={e => setEditingLog({...editingLog, note: e.target.value})}
                                            rows="3" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-300"></textarea>
                                    </div>
                                    <button type="submit" disabled={editingLogSaving} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-indigo-200 transition-all disabled:opacity-50">
                                        {editingLogSaving ? '保存中...' : '変更を保存する'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
