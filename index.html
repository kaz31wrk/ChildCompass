const GAS_URL = "https://script.google.com/macros/s/AKfycbwczk4hGoCM2d0SIA_MZbdPlg452xqmYSske15AjxxsDEAIY7jWmhoJUWUSzi9koYw/exec";

const runGas = async (actionName, params = {}) => {
    const isGasEnv = window.google && google.script && google.script.run;
    if (isGasEnv) {
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(res => {
                    try { resolve(typeof res === 'string' ? JSON.parse(res) : res); }
                    catch (e) { resolve(res); }
                })
                .withFailureHandler(reject)
                .executeActionFromRun(actionName, JSON.stringify(params));
        });
    }

    // GitHub Pages などの外部ホスティングから本番の GAS に接続する場合
    // ローカルデバッグ(localhostなど)で、且つ GAS_URL がないか接続を試みない場合はモックへフォールバック
    const isLocalMock = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || !GAS_URL;
    if (!isLocalMock) {
        try {
            // CORSプリフライトを回避するため、単純なPOSTリクエスト（JSON文字列をそのまま送信）
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: actionName, ...params })
            });
            if (response.ok) {
                const res = await response.json();
                if (res && res.error) throw new Error(res.error);
                return res;
            }
            throw new Error(`GAS API HTTP error: ${response.status}`);
        } catch (err) {
            console.warn("GAS API Request Failed, falling back to mock data: ", err);
        }
    }

        { timestamp: `${fmt(today)} 15:30:00`, type: '睡眠', note: '時間: 60分 (メモ: 昼寝)' },
        { timestamp: `${fmt(today)} 17:00:00`, type: '授乳', note: '量: 140ml, 時間: 20分' },

    }

    if (actionName === 'summarizeLogs') return { summary: 'ローカルモック: ログのAI要約サンプルです。' };

    if (actionName === 'customizeMilestonesAI') return { status: 'success', added: ['モック項目'], reply: 'AIカスタマイズ（モック）' };
    return { status: 'success' };
};

const callGeminiDirectly = async (actionName, params = {}) => {
    const isGasEnv = window.google && google.script && google.script.run;
    // ローカルデバッグ(localhostなど)で、且つ GAS_URL が無いか接続しない場合のみモックを返す
    const isLocalMock = !isGasEnv && (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || !GAS_URL);
    
    if (isLocalMock) {
        await new Promise(r => setTimeout(r, 800));
        if (actionName === 'getGeminiPromptAndKey') {
            const lastMsg = params.history?.slice(-1)[0]?.text || params.question || '';
            return "ローカルモックAI: 相談内容「" + lastMsg + "」に対するパーソナライズ回答です。";
        }
        if (actionName === 'getLogsSummaryPromptAndKey') {
            return "ローカルモックAI: 最近の記録データに基づく要約です。お子様は順調に成長しています。";
        }
        if (actionName === 'getSymptomPromptAndKey') {
            return JSON.stringify({
                urgency: "【翌日受診】翌日受診推奨",
                urgencyLevel: "info",
                reason: "熱が37.8℃で、機嫌が良く水分も取れている状態であるため（モック）。",
                advice: "部屋の温度を調節し、こまめな水分補給を行ってください。熱が上がるか様子を見ましょう。",
                points: ["機嫌や表情に変化がないか", "おしっこはしっかり出ているか", "呼吸が苦しそうでないか"],
                action: "明朝、かかりつけの小児科を受診することをお勧めします。"
            });
        }
        return "モック応答";
    }

    const res = await runGas(actionName, params);
    if (res.error) {
        if (res.error === 'gemini_api_key_not_configured') {
            throw new Error('Gemini APIキーが設定されていません。GASのスクリプトプロパティ「GEMINI_API_KEY」を設定してください。');
        }
        throw new Error(res.error);
    }
    if (res.empty) {
        return { empty: true, message: res.message };
    }
    
    const { prompt, apiKey } = res;
    const models = ["gemini-2.5-flash", "gemini-3.1-flash-lite", "gemini-2.5-flash-lite"];
    let lastError = null;

    // ペイロード構築：AIチャットの場合はマルチターン対応
    let bodyPayload = {};
    if (actionName === 'getGeminiPromptAndKey' && params.history) {
        const contents = [];
        const historyToMap = params.history || [];
        // 最初のメッセージが AI（案内メッセージ）なら除外する
        const startIndex = (historyToMap.length > 0 && historyToMap[0].sender === 'ai') ? 1 : 0;
        
        for (let i = startIndex; i < historyToMap.length; i++) {
            const msg = historyToMap[i];
            contents.push({
                role: msg.sender === 'user' ? 'user' : 'model',
                parts: [{ text: msg.text }]
            });
        }
        
        bodyPayload = {
            contents: contents,
            systemInstruction: {
                parts: [{ text: prompt }]
            }
        };
    } else {
        bodyPayload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }]
        };
    }
    
    for (const model of models) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyPayload)
            });
            if (response.ok) {
                const json = await response.json();
                const reply = json?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (reply) return reply.trim();
            } else {
                const errJson = await response.json().catch(() => ({}));
                lastError = errJson?.error?.message || `Status ${response.status}`;
            }
        } catch (e) {
            lastError = e.message;
        }
    }
    throw new Error(lastError || 'Gemini API呼び出しに失敗しました。');
};

const toDatetimeLocalValue = (d = new Date()) => {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const datetimeLocalToJst = (val) => {
    if (!val) return null;
    const d = new Date(val);
    if (isNaN(d.getTime())) return null;
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
};

const formatSuggestTime = (s) => {
    if (!s) return '—';
    const m = String(s).match(/(\d{4}\/\d{2}\/\d{2})\s+(\d{2}:\d{2})/);
    return m ? `${m[1]} ${m[2]}` : s;
};

// ============================================================
// ヘルパー：今日のログを集計
// ============================================================
const calcTodayTotals = (logs) => {
    const now = new Date();
    let milkMl = 0, sleepMin = 0;
    logs.forEach(log => {
        if (!log.timestamp) return;
        const logDate = new Date(log.timestamp);
        if (isNaN(logDate.getTime())) return;
        
        const isToday = logDate.getFullYear() === now.getFullYear() &&
                        logDate.getMonth() === now.getMonth() &&
                        logDate.getDate() === now.getDate();
        if (!isToday) return;

        const noteMatch = s => { 
            const m = String(log.note).match(new RegExp(s + ':\\s*(\\d+)')); 
            return m ? parseInt(m[1], 10) : 0; 
        };
        if (log.type === '授乳') milkMl += noteMatch('量');
        if (log.type === '睡眠') sleepMin += noteMatch('時間');
    });
    return { milkMl, sleepMin };
};

// ============================================================
// SVG Growth Chart Component
// ============================================================
const GrowthChart = ({ data }) => {
    if (!data || data.length === 0) {
        return <div className="text-center py-10 text-slate-400 text-sm border border-dashed border-slate-200 rounded-2xl">成長データがまだありません</div>;
    }
    
    const sorted = [...data].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    const heights = sorted.map(d => parseFloat(d.height)).filter(h => !isNaN(h));
    const weights = sorted.map(d => parseFloat(d.weight)).filter(w => !isNaN(w));
    
    if (heights.length === 0 && weights.length === 0) {
        return <div className="text-center py-10 text-slate-400 text-sm border border-dashed border-slate-200 rounded-2xl">有効な身長・体重データがありません</div>;
    }

    const minH = heights.length ? Math.min(...heights) - 3 : 50;
    const maxH = heights.length ? Math.max(...heights) + 3 : 90;
    const minW = weights.length ? Math.min(...weights) - 1 : 3;
    const maxW = weights.length ? Math.max(...weights) + 1 : 15;

    const width = 340;
    const height = 180;
    const padding = 30;

    const getX = (idx) => padding + (idx * (width - padding * 2) / Math.max(1, sorted.length - 1));
    const getY = (val, min, max) => height - padding - ((val - min) * (height - padding * 2) / Math.max(1, max - min));

    const heightPoints = sorted.map((d, i) => d.height ? `${getX(i)},${getY(parseFloat(d.height), minH, maxH)}` : '').filter(Boolean).join(' ');
    const weightPoints = sorted.map((d, i) => d.weight ? `${getX(i)},${getY(parseFloat(d.weight), minW, maxW)}` : '').filter(Boolean).join(' ');

    return (
        <div className="bg-white/90 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
            <div className="flex justify-between items-center text-[10px]">
                <span className="flex items-center space-x-1"><span className="w-3.5 h-1 bg-indigo-500 rounded-full inline-block" /> <span className="font-bold text-slate-600">身長 (左軸: cm)</span></span>
                <span className="flex items-center space-x-1"><span className="w-3.5 h-1 bg-emerald-500 rounded-full inline-block" /> <span className="font-bold text-slate-600">体重 (右軸: kg)</span></span>
            </div>
            <div className="relative">
                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                    {[0, 0.25, 0.5, 0.75, 1].map((ratio, idx) => {
                        const y = padding + ratio * (height - padding * 2);
                        const hVal = Math.round((maxH - (ratio * (maxH - minH))) * 10) / 10;
                        const wVal = Math.round((maxW - (ratio * (maxW - minW))) * 10) / 10;
                        return (
                            <g key={idx}>
                                <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#f1f5f9" strokeWidth="1" />
                                <text x={padding - 6} y={y + 3} textAnchor="end" className="text-[9px] fill-indigo-400 font-bold font-mono">{hVal}</text>
                                <text x={width - padding + 6} y={y + 3} textAnchor="start" className="text-[9px] fill-emerald-500 font-bold font-mono">{wVal}</text>
                            </g>
                        );
                    })}
                    {sorted.map((d, i) => {
                        const x = getX(i);
                        const m = d.timestamp.match(/\/(\d{2}\/\d{2})/);
                        const dateStr = m ? m[1] : '';
                        return (
                            <text key={i} x={x} y={height - 8} textAnchor="middle" className="text-[8px] fill-slate-400 font-bold font-mono">{dateStr}</text>
                        );
                    })}
                    {heightPoints && (
                        <polyline fill="none" stroke="#6366f1" strokeWidth="3" points={heightPoints} className="chart-line" strokeLinecap="round" strokeLinejoin="round" />
                    )}
                    {weightPoints && (
                        <polyline fill="none" stroke="#10b981" strokeWidth="3" points={weightPoints} className="chart-line" strokeLinecap="round" strokeLinejoin="round" />
                    )}
                    {sorted.map((d, i) => {
                        const x = getX(i);
                        const yH = d.height ? getY(parseFloat(d.height), minH, maxH) : null;
                        const yW = d.weight ? getY(parseFloat(d.weight), minW, maxW) : null;
                        return (
                            <g key={i}>
                                {yH !== null && (
                                    <circle cx={x} cy={yH} r="4.5" fill="#6366f1" stroke="white" strokeWidth="2" className="hover:scale-150 transition-all cursor-pointer">
                                        <title>{`身長: ${d.height}cm\n測定日: ${d.timestamp}`}</title>
                                    </circle>
                                )}
                                {yW !== null && (
                                    <circle cx={x} cy={yW} r="4.5" fill="#10b981" stroke="white" strokeWidth="2" className="hover:scale-150 transition-all cursor-pointer">
                                        <title>{`体重: ${d.weight}kg\n測定日: ${d.timestamp}`}</title>
                                    </circle>
                                )}
                            </g>
                        );
                    })}
                </svg>
            </div>
        </div>
    );
};

    // ブラウザから直接 Overpass API を叩く（GASの6秒タイムアウト回避）
    // カテゴリ別にクエリを分割して公園が飲食店に埋もれることを防ぐ
    const fetchOverpassDirectly = async (lat, lng, radius = 1500) => {
        // 公園・緑地系（way中心なので上限を多めに）
        const queryParks = `[out:json][timeout:30];
(
  node["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
  way["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
  relation["leisure"~"^(playground|park)"](around:${radius},${lat},${lng});
);
out center 30;`;

        // 子育て施設系（児童館・保育園・授乳室）
        const queryCommunity = `[out:json][timeout:30];
(
  node["amenity"~"^(community_centre|childcare|kindergarten|social_facility)"](around:${radius},${lat},${lng});
  way["amenity"~"^(community_centre|childcare|kindergarten|social_facility)"](around:${radius},${lat},${lng});
  node["amenity"="toilets"]["changing_table"="yes"](around:${radius},${lat},${lng});
  node["amenity"="baby_hatch"](around:${radius},${lat},${lng});
  node["amenity"~"^(hospital|clinic|doctors)"](around:${radius},${lat},${lng});
  way["amenity"~"^(hospital|clinic|doctors)"](around:${radius},${lat},${lng});
);
out center 20;`;

        // 飲食店・ショップ系
        const queryEats = `[out:json][timeout:30];
(
  node["amenity"~"^(restaurant|cafe|fast_food)"](around:${radius},${lat},${lng});
  way["amenity"~"^(restaurant|cafe|fast_food)"](around:${radius},${lat},${lng});
  node["shop"~"^(toys|baby_goods|clothes|mall|supermarket|convenience)"](around:${radius},${lat},${lng});
  way["shop"~"^(toys|baby_goods|clothes|mall|supermarket|convenience)"](around:${radius},${lat},${lng});
);
out center 20;`;

        const endpoints = [
            'https://overpass-api.de/api/interpreter',
            'https://overpass.kumi.systems/api/interpreter',
        ];

        const runQuery = async (query) => {
            for (const endpoint of endpoints) {
                try {
                    const resp = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: 'data=' + encodeURIComponent(query),
                        signal: AbortSignal.timeout ? AbortSignal.timeout(35000) : undefined,
                    });
                    if (!resp.ok) continue;
                    const json = await resp.json();
                    return json.elements || [];
                } catch (err) {
                    console.warn('Overpass endpoint failed:', endpoint, err.message);
                }
            }
            return [];
        };

        const parseElement = (el) => {
            const tags = el.tags || {};
            const name = tags.name || tags['name:ja'] || tags.operator;
            if (!name) return null;

            let elLat = el.lat, elLng = el.lon;
            if ((elLat == null || elLng == null) && el.center) {
                elLat = el.center.lat; elLng = el.center.lon;
            }
            if (elLat == null || elLng == null) return null;

            const addrParts = [
                tags['addr:province'] || tags['addr:state'],
                tags['addr:city'],
                tags['addr:suburb'],
                tags['addr:quarter'],
                tags['addr:housenumber'],
            ].filter(Boolean);
            const address = tags['addr:full'] || addrParts.join('') || '住所情報なし';
            const phone = tags.phone || tags['contact:phone'] || '';

            const leisure = tags.leisure || '';
            const amenity = tags.amenity || '';
            const shop = tags.shop || '';
            let type = 'shop';
            if (leisure === 'playground' || leisure === 'park') type = 'park';
            else if (['community_centre','childcare','kindergarten','social_facility'].includes(amenity)) type = 'community';
            else if (['restaurant','cafe','fast_food'].includes(amenity)) type = 'restaurant';
            else if (['hospital','clinic','doctors'].includes(amenity)) type = 'hospital';
            else if (amenity === 'toilets' || amenity === 'baby_hatch') type = 'baby_room';
            else if (shop) type = 'shop';

            const childFriendlyTags = [];
            if (tags['changing_table'] === 'yes') childFriendlyTags.push('おむつ替えあり');
            if (tags['highchair'] === 'yes' || tags['highchair'] === 'provided') childFriendlyTags.push('ハイチェアあり');
            if (tags['baby_room'] === 'yes') childFriendlyTags.push('授乳室あり');
            if (tags['playground'] === 'yes' || leisure === 'playground') childFriendlyTags.push('遊具あり');
            if (tags['children'] === 'yes' || tags['kids_area'] === 'yes') childFriendlyTags.push('キッズスペースあり');
            if (tags['stroller'] === 'yes' || tags['wheelchair'] === 'yes') childFriendlyTags.push('ベビーカーOK');

            return { name, address, phone, lat: elLat, lng: elLng, type, childFriendlyTags, source: 'openstreetmap' };
        };

        // 3クエリを並列実行してマージ（IDで重複排除）
        const [parksElems, communityElems, eatsElems] = await Promise.all([
            runQuery(queryParks),
            runQuery(queryCommunity),
            runQuery(queryEats),
        ]);

        const allElems = [...parksElems, ...communityElems, ...eatsElems];
        const seen = new Set();
        const places = [];
        for (const el of allElems) {
            const key = `${el.type}:${el.id}`;
            if (seen.has(key)) continue;
            seen.add(key);
            const parsed = parseElement(el);
            if (parsed) places.push(parsed);
        }
        return places;
    };


    const loadNearbyFacilities = async (lat, lng) => {
        setFacilitiesLoading(true);
        try {
            const places = await fetchOverpassDirectly(lat, lng);
            setFacilities(places);
        } catch (e) {
            console.error(e);
            setFacilities([]);
        } finally {
            setFacilitiesLoading(false);
        }
    };


    const loadSuggestions = async () => {
        try {
            const s = await runGas('getSuggestions', ctx());
            setSuggestions(s);
            if (s.milkMl && s.milkMl.length) setMilkMl(s.milkMl[0]);
            if (s.sleepMin && s.sleepMin.length) setSleepMin(s.sleepMin[0]);
        } catch (e) { console.error(e); }
    };

    const loadAllData = async () => {
        try {
            const c = ctx();
            const [l, m, fam, ch, sett, g] = await Promise.all([
                runGas('getLogs', c),
                runGas('getMilestones', c),
                runGas('getFamilies'),
                runGas('getChildren', { familyId }),
                runGas('getSettings', { familyId }),
                runGas('getGrowth', c)
            ]);
            setLogs(l || []);
            setMilestones(m || []);
            setFamilies(fam || []);
            setChildren(ch || []);
            setGrowthData(g || []);
            if (ch && ch.length) {
                const still = ch.find(c => c.id === childId);
                if (!still) setChildId(ch[0].id);
            }
            if (sett) setSettingsForm({
                feed_interval_hours: parseFloat(sett.feed_interval_hours) || 3,
                sleep_interval_hours: parseFloat(sett.sleep_interval_hours) || 2,
                suggest_mode: sett.suggest_mode || 'average'
            });
            await loadSuggestions();
            if (userLocation) await loadNearbyFacilities(userLocation.lat, userLocation.lng);
        } catch (err) { console.error(err); }
    };

    // Build note string from structured inputs
    const buildNote = () => {
        if (logType === '授乳') {
            const base = `量: ${milkMl}ml, 時間: ${milkMin}分`;
            return logNote.trim() ? `${base} (メモ: ${logNote.trim()})` : base;
        }
        if (logType === '睡眠') {
            const base = `時間: ${sleepMin}分`;
            return logNote.trim() ? `${base} (メモ: ${logNote.trim()})` : base;
        }
        if (logType === '食事') {
            const base = `完食度: ${foodType}${foodMenu.trim() ? `, メニュー: ${foodMenu.trim()}` : ''}`;
            return logNote.trim() ? `${base} (メモ: ${logNote.trim()})` : base;
        }
        if (logType === 'おむつ') {
            const base = `種類: ${excretionType}, 状態: ${excretionState}`;
            return logNote.trim() ? `${base} (メモ: ${logNote.trim()})` : base;
        }
        if (logType === '体調') {
            const activeSymptoms = Object.entries(symptoms)
                .filter(([_, active]) => active)
                .map(([key]) => ({
                    fever: '発熱', cough: '咳', runnyNose: '鼻水',
                    vomit: '嘔吐', diarrhea: '下痢', rash: '発疹', badMood: '不機嫌'
                }[key]))
                .filter(Boolean)
                .join('・');
            const base = `体温: ${bodyTemp}℃${activeSymptoms ? `, 症状: ${activeSymptoms}` : ''}`;
            return logNote.trim() ? `${base} (メモ: ${logNote.trim()})` : base;
        }
        return logNote.trim() || '記録';
    };

    const handleAddLog = async (e) => {
        e.preventDefault();
        const isFreeType = logType !== '授乳' && logType !== '睡眠' && logType !== '食事' && logType !== 'おむつ' && logType !== '体調';
        if (isFreeType && !logNote.trim()) return;
        setLogLoading(true);
        try {
            await runGas('addLog', {
                type: logType,
                note: buildNote(),
                timestamp: datetimeLocalToJst(logTimestamp),
                ...ctx()
            });
            setLogNote('');
            setFoodMenu('');
            setSymptoms({
                fever: false, cough: false, runnyNose: false,
                vomit: false, diarrhea: false, rash: false, badMood: false
            });
            setLogTimestamp(toDatetimeLocalValue());
            const updatedLogs = await runGas('getLogs', ctx());
            setLogs(updatedLogs || []);
            await loadSuggestions();
        } catch { alert('ログの追加に失敗しました。'); }
        finally { setLogLoading(false); }
    };

    const handleAddGrowth = async (e) => {
        e.preventDefault();
        if (!growthHeight && !growthWeight && !growthHead) return;
        setGrowthLoading(true);
        try {
            await runGas('addGrowth', {
                height: growthHeight,
                weight: growthWeight,
                headCircumference: growthHead,
                timestamp: datetimeLocalToJst(logTimestamp),
                ...ctx()
            });
            setGrowthHeight('');
            setGrowthWeight('');
            setGrowthHead('');
            const g = await runGas('getGrowth', ctx());
            setGrowthData(g || []);
        } catch { alert('成長記録の登録に失敗しました。'); }
        finally { setGrowthLoading(false); }
    };

    const handleEvaluateSymptom = async (e) => {
        e.preventDefault();
        if (!emergencySymptom.trim()) return;
        setTriageLoading(true);
        try {
            const reply = await callGeminiDirectly('getSymptomPromptAndKey', {
                symptom: emergencySymptom,
                ...ctx()
            });
            const match = reply.match(/\{[\s\S]*\}/);
            if (match) {
                setTriageResult(JSON.parse(match[0]));
            } else {
                setTriageResult({
                    urgency: "【翌日受診】翌日受診推奨",
                    urgencyLevel: "info",
                    reason: "AIの判定フォーマットエラー",
                    advice: reply,
                    points: ["様子を見て水分摂取を行ってください"],
                    action: "翌日小児科を受診してください"
                });
            }
        } catch (err) { alert('AI症状評価の実行に失敗しました。原因: ' + err.message); }
        finally { setTriageLoading(false); }
    };

    const handleSaveSettings = async () => {
        await runGas('saveSettings', { familyId, settings: settingsForm });
        setShowSettings(false);
        await loadSuggestions();
    };

    const handleAddFamily = async () => {
        if (!newFamilyName.trim()) return;
        const res = await runGas('addFamily', { name: newFamilyName.trim() });
        setNewFamilyName('');
        const fam = await runGas('getFamilies');
        setFamilies(fam || []);
        if (res.id) setFamilyId(res.id);
    };

    const handleAddChild = async () => {
        if (!newChildName.trim()) return;
        const res = await runGas('addChild', { familyId, name: newChildName.trim(), birthDate: newChildBirth });
        setNewChildName('');
        setNewChildBirth('');
        const ch = await runGas('getChildren', { familyId });
        setChildren(ch || []);
        if (res.id) setChildId(res.id);
    };

    const handleHideMilestone = async (id, e) => {
        e.stopPropagation();
        if (!confirm('このマイルストーンを非表示にしますか？')) return;
        await runGas('hideMilestone', { id });
        const m = await runGas('getMilestones', ctx());
        setMilestones(m || []);
    };

    const handleAddMilestone = async () => {
        if (!newMilestoneTitle.trim()) return;
        await runGas('addMilestone', { title: newMilestoneTitle.trim(), familyId });
        setNewMilestoneTitle('');
        const m = await runGas('getMilestones', ctx());
        setMilestones(m || []);
    };

    const handleMilestoneAI = async () => {
        setMilestoneAiLoading(true);
        try {
            const res = await runGas('customizeMilestonesAI', { familyId, childId, prompt: milestoneAiPrompt });
            if (res.status === 'success') {
                const m = await runGas('getMilestones', ctx());
                setMilestones(m || []);
                alert((res.added && res.added.length) ? `追加しました: ${res.added.join('、')}` : 'AIが項目を提案しました。');
            } else alert(res.message || 'AIカスタマイズに失敗しました');
        } catch { alert('AIカスタマイズに失敗しました'); }
        finally { setMilestoneAiLoading(false); }
    };

    const handleToggleMilestone = async (id) => {
        setMilestones(prev => prev.map(m => m.id === id ? { ...m, completed: !m.completed } : m));
        try { await runGas('toggleMilestone', { id }); }
        catch { const freshMs = await runGas('getMilestones'); setMilestones(freshMs || []); }
    };

    const handleGenerateSummary = async () => {
        setSummaryLoading(true);
        try { 
            const res = await callGeminiDirectly('getLogsSummaryPromptAndKey', ctx());
            if (typeof res === 'object' && res.empty) {
                setSummaryText(res.message);
            } else {
                setSummaryText(res); 
            }
        }
        catch (err) { setSummaryText('要約の生成中にエラーが発生しました。原因: ' + err.message); }
        finally { setSummaryLoading(false); }
    };

    const handleSendChat = async (e, custom = null) => {
        if (e) e.preventDefault();
        const text = custom || chatInput;
        if (!text.trim() || chatLoading) return;
        
        const newHistory = [...chatMessages, { sender: 'user', text }];
        setChatMessages(newHistory);
        if (!custom) setChatInput('');
        setChatLoading(true);
        try { 
            const reply = await callGeminiDirectly('getGeminiPromptAndKey', { history: newHistory, ...ctx() }); 
            setChatMessages(prev => [...prev, { sender: 'ai', text: reply }]); 
        }
        catch (err) { setChatMessages(prev => [...prev, { sender: 'ai', text: '申し訳ありません、回答を取得できませんでした。原因: ' + err.message }]); }
        finally { setChatLoading(false); }
    };

    const handleRequestGPS = () => {
        if (!navigator.geolocation) { setGpsError(true); return; }
        setGpsLoading(true);
        setGpsError(false);
        navigator.geolocation.getCurrentPosition(
            async pos => {
                const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                setUserLocation(loc);
                setGpsError(false);
                await loadNearbyFacilities(loc.lat, loc.lng);
                setGpsLoading(false);
            },
            (err) => {
                console.warn('GPS取得失敗:', err.message);
                setGpsLoading(false);
                setGpsError(true);
            },
            { timeout: 10000, enableHighAccuracy: false }
        );
    };

    const handleAddressSearch = async (e) => {
        e.preventDefault();
        if (!addressInput.trim()) return;
        setAddressLoading(true);
        try {
            const res = await runGas('geocodeAddress', { q: addressInput.trim() });
            if (res && res.lat && res.lng) {
                const loc = { lat: res.lat, lng: res.lng };
                setUserLocation(loc);
                setGpsError(false);
                await loadNearbyFacilities(loc.lat, loc.lng);
            } else {
                alert('住所から場所を特定できませんでした。より具体的な住所で再試してください。');
            }
        } catch (err) {
            console.error(err);
        } finally {
            setAddressLoading(false);
        }
    };


    React.useEffect(() => {
        if (userLocation && activeTab === 'facilities') {
            loadNearbyFacilities(userLocation.lat, userLocation.lng);
        }
    }, [facFilter]);

    const toggleCat = (key) => setOpenCats(prev => ({ ...prev, [key]: !prev[key] }));

    const getTypeColor = (type) => ({
        '授乳': 'bg-rose-100 text-rose-700 border-rose-200',
        '睡眠': 'bg-indigo-100 text-indigo-700 border-indigo-200',
        '食事': 'bg-emerald-100 text-emerald-700 border-emerald-200',
        'おむつ': 'bg-amber-100 text-amber-700 border-amber-200',
        '体調': 'bg-red-100 text-red-700 border-red-200',
        'お薬': 'bg-teal-100 text-teal-700 border-teal-200',
    }[type] || 'bg-slate-100 text-slate-700 border-slate-200');

    const { milkMl: todayMilk, sleepMin: todaySleep } = calcTodayTotals(logs);

    // Filtered facilities
    const filteredFac = displayFacilities.filter(f => {
        const matchType = facFilter === 'all' || f.type === facFilter;
        const matchQ = f.name.includes(searchQuery) || f.address.includes(searchQuery);
        return matchType && matchQ;
    });

    // Select options helpers
    const mlOptions = Array.from({ length: 51 }, (_, i) => i * 10);       // 0-500ml, 10ml step
    const milkMinOpts = Array.from({ length: 25 }, (_, i) => i * 5);      // 0-120min, 5min step (0, 5, 10 ... 120)
    const sleepMinOpts = [10, 15, 20, 25, 30, 40, 50, 60, 75, 90, 105, 120, 150, 180, 210, 240, 300, 360, 420, 480]; // sleep durations

    return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col pb-28 md:max-w-3xl lg:max-w-6xl lg:px-4">
            {/* Header */}
            <header className="sticky top-0 z-30 backdrop-blur-md bg-white/80 border-b border-slate-100 px-4 py-3 shadow-sm space-y-2">
                <div className="flex items-center justify-between">
                    <div className="flex items-center space-x-2">
                        <div className="p-1.5 bg-indigo-600 rounded-xl text-white shadow shadow-indigo-200">
                            <Icon.Home />
                        </div>
                        <span className="font-title font-bold text-xl bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent">ChildCompass</span>
                    </div>
                    <div className="flex items-center space-x-1">
                        <button onClick={() => setShowSettings(true)} className="px-2 py-1 text-[10px] font-bold text-indigo-600 bg-indigo-50 rounded-lg border border-indigo-100">設定</button>
                        <button onClick={loadAllData} className="p-2 text-slate-400 hover:text-indigo-600 rounded-xl hover:bg-slate-50">
                            <Icon.Refresh />
                        </button>
                    </div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                    <select value={familyId} onChange={e => { setFamilyId(e.target.value); setChildId(''); }}
                        className="text-[11px] bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 font-semibold">
                        {(families.length ? families : [{ id: 'fam_default', name: 'わが家' }]).map(f => (
                            <option key={f.id} value={f.id}>{f.name}</option>
                        ))}
                    </select>
                    <select value={childId} onChange={e => setChildId(e.target.value)}
                        className="text-[11px] bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5 font-semibold">
                        {(children.length ? children : [{ id: 'child_1', name: 'お子さま' }]).map(c => (
                            <option key={c.id} value={c.id}>{c.name}</option>
                        ))}
                    </select>
                </div>
            </header>

            {showSettings && (
                <div className="fixed inset-0 z-50 bg-black/40 flex items-end sm:items-center justify-center p-4" onClick={() => setShowSettings(false)}>
                    <div className="bg-white rounded-2xl p-4 w-full max-w-md max-h-[85vh] overflow-y-auto shadow-xl" onClick={e => e.stopPropagation()}>
                        <h3 className="font-bold text-slate-800 mb-3">設定・家族管理</h3>
                        <div className="space-y-3 text-sm">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase">次回サジェスト（授乳間隔・時間）</label>
                                <select value={settingsForm.suggest_mode} onChange={e => setSettingsForm(s => ({ ...s, suggest_mode: e.target.value }))}
                                    className="w-full mt-1 custom-select bg-slate-50 border rounded-xl px-3 py-2">
                                    <option value="average">直近の平均間隔</option>
                                    <option value="last">前回の間隔</option>
                                    <option value="fixed">固定間隔（下の設定値）</option>
                                </select>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400">授乳間隔（時間）</label>
                                    <input type="number" step="0.5" min="1" max="8" value={settingsForm.feed_interval_hours}
                                        onChange={e => setSettingsForm(s => ({ ...s, feed_interval_hours: parseFloat(e.target.value) }))}
                                        className="w-full mt-1 bg-slate-50 border rounded-xl px-3 py-2" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400">睡眠間隔（時間）</label>
                                    <input type="number" step="0.5" min="0.5" max="12" value={settingsForm.sleep_interval_hours}
                                        onChange={e => setSettingsForm(s => ({ ...s, sleep_interval_hours: parseFloat(e.target.value) }))}
                                        className="w-full mt-1 bg-slate-50 border rounded-xl px-3 py-2" />
                                </div>
                            </div>
                            <p className="text-[11px] text-slate-500">複数のお子さまは「お子さま」切替で記録を分けます。別家族は「家族」を追加して切り替えてください（データはスプレッドシートに蓄積されます）。</p>
                            <div className="border-t pt-3">
                                <label className="text-[10px] font-bold text-slate-400">家族を追加</label>
                                <div className="flex gap-2 mt-1">
                                    <input value={newFamilyName} onChange={e => setNewFamilyName(e.target.value)} placeholder="例）祖母の家"
                                        className="flex-1 bg-slate-50 border rounded-xl px-3 py-2 text-sm" />
                                    <button type="button" onClick={handleAddFamily} className="px-3 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl">追加</button>
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400">お子さまを追加</label>
                                <input value={newChildName} onChange={e => setNewChildName(e.target.value)} placeholder="名前"
                                    className="w-full mt-1 bg-slate-50 border rounded-xl px-3 py-2 text-sm" />
                                <input type="date" value={newChildBirth} onChange={e => setNewChildBirth(e.target.value)}
                                    className="w-full mt-1 bg-slate-50 border rounded-xl px-3 py-2 text-sm" />
                                <button type="button" onClick={handleAddChild} className="mt-2 w-full py-2 bg-violet-600 text-white text-xs font-bold rounded-xl">お子さまを登録</button>
                            </div>
                            <button onClick={handleSaveSettings} className="w-full py-2.5 bg-indigo-600 text-white font-bold rounded-xl">設定を保存</button>
                        </div>
                    </div>
                </div>
            )}

            <main className="flex-1 px-4 py-4 space-y-0">

            {/* ======================== DASHBOARD ======================== */}
            {activeTab === 'dashboard' && (
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start animate-fade-in">
                    <div className="lg:col-span-7 space-y-4">

                    {/* Next schedule suggestions */}
                    {suggestions && (
                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-rose-50/80 border border-rose-200 rounded-2xl p-3">
                                <div className="text-[10px] font-bold text-rose-500 uppercase">次の授乳（目安）</div>
                                <div className="text-sm font-bold text-rose-800 mt-1">{formatSuggestTime(suggestions.nextFeed?.suggestedAt)}</div>
                                <div className="text-[10px] text-rose-400">{suggestions.nextFeed?.label} · 約{suggestions.nextFeed?.intervalHours}h</div>
                            </div>
                            <div className="bg-indigo-50/80 border border-indigo-200 rounded-2xl p-3">
                                <div className="text-[10px] font-bold text-indigo-500 uppercase">次の睡眠（目安）</div>
                                <div className="text-sm font-bold text-indigo-800 mt-1">{formatSuggestTime(suggestions.nextSleep?.suggestedAt)}</div>
                                <div className="text-[10px] text-indigo-400">{suggestions.nextSleep?.label} · 約{suggestions.nextSleep?.intervalHours}h</div>
                            </div>
                        </div>
                    )}

                    {/* Today's Totals Card */}
                    <div className="grid grid-cols-2 gap-3">
                        <div className="bg-gradient-to-br from-rose-50 to-pink-100 border border-rose-200 rounded-2xl p-4 shadow-sm">
                            <div className="text-2xl mb-1">🍼</div>
                            <div className="text-2xl font-bold text-rose-700">{todayMilk}<span className="text-sm font-semibold text-rose-500 ml-1">ml</span></div>
                            <div className="text-xs text-rose-500 font-medium mt-0.5">今日の授乳量</div>
                        </div>
                        <div className="bg-gradient-to-br from-indigo-50 to-violet-100 border border-indigo-200 rounded-2xl p-4 shadow-sm">
                            <div className="text-2xl mb-1">💤</div>
                            <div className="text-2xl font-bold text-indigo-700">{todaySleep}<span className="text-sm font-semibold text-indigo-400 ml-1">分</span></div>
                            <div className="text-xs text-indigo-500 font-medium mt-0.5">今日の睡眠時間</div>
                        </div>
                    </div>

                    {/* AI Summary Banner */}
                    <div className="bg-gradient-to-tr from-violet-100/90 to-amber-100/90 border border-violet-200/60 rounded-2xl p-4 shadow-sm">
                        <div className="flex items-center justify-between mb-2">
                            <div className="flex items-center space-x-1.5 text-indigo-900">
                                <Icon.Sparkles className="text-violet-600" />
                                <span className="font-semibold text-sm">AIライフログ要約</span>
                            </div>
                            <button onClick={handleGenerateSummary} disabled={summaryLoading}
                                className="px-3 py-1 bg-white hover:bg-indigo-50 border border-indigo-200 text-indigo-700 text-xs font-bold rounded-lg shadow-sm transition-all disabled:opacity-50">
                                {summaryLoading ? '分析中…' : '要約する'}
                            </button>
                        </div>
                        {summaryText
                            ? <p className="text-slate-700 text-xs leading-relaxed bg-white/50 p-3 rounded-xl border border-white/60">{summaryText}</p>
                            : <p className="text-slate-500 text-xs">最近のログをAIが分析し、要約とワンポイントアドバイスを提供します。</p>}
                    </div>

                    {/* Log Form */}
                    <div className="bg-white/80 border border-slate-100 rounded-2xl p-4 shadow-sm">
                        <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">育児ログを記録する</h2>
                        <form onSubmit={handleAddLog} className="space-y-3">

                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">記録する日時（いつの出来事か）</label>
                                <input type="datetime-local" value={logTimestamp} onChange={e => setLogTimestamp(e.target.value)}
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-300" />
                                <button type="button" onClick={() => setLogTimestamp(toDatetimeLocalValue())}
                                    className="mt-1 text-[10px] text-indigo-600 font-semibold">今の時刻に戻す</button>
                            </div>

                            {/* Category chips */}
                            <div className="grid grid-cols-6 gap-1">
                                {['授乳', '睡眠', '食事', 'おむつ', '体調', 'その他'].map(type => (
                                    <button key={type} type="button" onClick={() => setLogType(type)}
                                        className={`py-2 px-0.5 text-[9px] font-bold rounded-xl border transition-all ${logType === type ? 'bg-indigo-600 border-indigo-600 text-white shadow scale-105' : 'bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100'}`}>
                                        <div className="text-sm leading-none mb-0.5">
                                            {type === '授乳' && '🍼'}
                                            {type === '睡眠' && '💤'}
                                            {type === '食事' && '🍎'}
                                            {type === 'おむつ' && '💩'}
                                            {type === '体調' && '🌡️'}
                                            {type === 'その他' && '✏️'}
                                        </div>
                                        {type}
                                    </button>
                                ))}
                            </div>

                            {/* Milk selectors */}
                            {logType === '授乳' && (
                                <div className="space-y-2">
                                    {suggestions?.milkMl?.length > 0 && (

                                                <h4 className="font-bold text-slate-800 truncate">{f.name}</h4>
                                                <p className="text-[10px] text-slate-500 truncate mt-0.5">{f.address}</p>
                                            </div>
                                            <div className="flex space-x-1 shrink-0 ml-2">
                                                {f.phone && (
                                                    <button
                                                        onClick={() => setCallConfirm({
                                                            number: f.phone,
                                                            label: f.name,
                                                            emoji: '🏥',
                                                            description: '救急・夜間対応の医療機関です。事前に受入体制や診察時間をご確認ください。'
                                                        })}
                                                        className="p-1.5 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-100 active:scale-95 transition-all"
                                                    >
                                                        📞
                                                    </button>
                                                )}
                                                <a href={mapsUrl} target="_blank" className="p-1.5 bg-green-50 border border-green-100 text-green-600 rounded-lg">🗺</a>
                                            </div>
                                        </div>
                                    );
                                })
                            }
                        </div>
                    </div>
                    </div>
                </div>
            )}

            {/* ======================== MILESTONES ======================== */}
            {activeTab === 'milestones' && (
                <div className="space-y-3 animate-fade-in">
                    <div className="bg-white/80 border border-slate-100 rounded-2xl p-4 shadow-sm space-y-3">
                        <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">成長マイルストーン</h2>
                        <p className="text-slate-400 text-xs">達成したらタップ。長押し相当の「非表示」でリストから隠せます。Geminiで発達に合わせて追加も可能です。</p>
                        <div className="flex gap-2">
                            <input value={newMilestoneTitle} onChange={e => setNewMilestoneTitle(e.target.value)} placeholder="自分で追加…"
                                className="flex-1 bg-slate-50 border rounded-xl px-3 py-2 text-sm" />
                            <button type="button" onClick={handleAddMilestone} className="px-3 py-2 bg-indigo-600 text-white text-xs font-bold rounded-xl shrink-0">追加</button>
                        </div>
                        <div>
                            <input value={milestoneAiPrompt} onChange={e => setMilestoneAiPrompt(e.target.value)} placeholder="AIに相談: 例）7ヶ月の発達で追加して"
                                className="w-full bg-slate-50 border rounded-xl px-3 py-2 text-sm mb-2" />
                            <button type="button" onClick={handleMilestoneAI} disabled={milestoneAiLoading}
                                className="w-full py-2 bg-violet-600 text-white text-xs font-bold rounded-xl disabled:opacity-50">
                                {milestoneAiLoading ? 'AIが提案中…' : '✨ Geminiでマイルストーンをカスタマイズ'}
                            </button>
                        </div>
                        <div className="mt-2 flex items-center space-x-3">
                            <div className="flex items-center space-x-1">
                                <div className="w-2.5 h-2.5 rounded-full bg-indigo-500" />
                                <span className="text-[11px] text-slate-500">達成済み {milestones.filter(m => m.completed).length}件</span>
                            </div>
                            <div className="flex items-center space-x-1">
                                <div className="w-2.5 h-2.5 rounded-full bg-slate-200" />
                                <span className="text-[11px] text-slate-500">未達成 {milestones.filter(m => !m.completed).length}件</span>
                            </div>
                        </div>
                    </div>

                    {MILESTONE_CATEGORIES.map(cat => {
                        const catItems = milestones.filter(m => m.category === cat.key);
                        if (catItems.length === 0) return null;
                        const c = CAT_COLORS[cat.color];
                        const completedCount = catItems.filter(m => m.completed).length;
                        const isOpen = openCats[cat.key] !== false;
                        return (
                            <div key={cat.key} className={`border ${c.border} rounded-2xl overflow-hidden shadow-sm`}>
                                <button onClick={() => toggleCat(cat.key)}
                                    className={`w-full flex items-center justify-between px-4 py-3 ${c.bg} transition-colors`}>
                                    <div className="flex items-center space-x-2">
                                        <span className="text-lg">{cat.emoji}</span>
                                        <div className="text-left">
                                            <div className={`text-sm font-bold ${c.text}`}>{cat.label}</div>
                                            <div className="text-[10px] text-slate-500">{completedCount}/{catItems.length} 達成</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center space-x-2">
                                        <div className="w-16 h-1.5 bg-white/60 rounded-full overflow-hidden">
                                            <div className={`h-full ${c.dot} rounded-full transition-all`} style={{ width: `${catItems.length ? (completedCount/catItems.length)*100 : 0}%` }} />
                                        </div>
                                        <div className={`transition-transform ${isOpen ? 'rotate-180' : ''} ${c.text}`}>
                                            <Icon.ChevronDown />
                                        </div>
                                    </div>
                                </button>
                                <div className={`accordion-content ${isOpen ? 'open' : 'closed'}`}>
                                    <div className="divide-y divide-slate-100">
                                        {catItems.map(m => (
                                            <div key={m.id} className={`flex items-center ${m.completed ? 'bg-indigo-50/60' : 'bg-white'}`}>
                                                <button onClick={() => handleToggleMilestone(m.id)}
                                                    className="flex-1 flex items-center justify-between px-4 py-3 text-left hover:bg-slate-50">
                                                    <div className="flex items-center space-x-3">
                                                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 ${m.completed ? 'bg-indigo-600 border-indigo-600' : 'border-slate-300 bg-white'}`}>
                                                            {m.completed && (
                                                                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4"><polyline points="20 6 9 17 4 12"/></svg>
                                                            )}
                                                        </div>
                                                        <span className={`text-sm ${m.completed ? 'text-indigo-800 font-semibold line-through' : 'text-slate-700 font-medium'}`}>{m.title}</span>
                                                    </div>
                                                    {m.completed && <span className="text-lg">🎉</span>}
                                                </button>
                                                <button type="button" onClick={e => handleHideMilestone(m.id, e)} title="非表示"
                                                    className="px-3 py-3 text-slate-300 hover:text-rose-500 text-xs">✕</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            )}

            {/* ======================== AI CONSULTING ======================== */}
            {activeTab === 'ai-consult' && (
                <div className="flex flex-col bg-white/80 border border-slate-100 rounded-2xl shadow-sm overflow-hidden animate-fade-in" style={{ height: '70vh' }}>
                    <div className="bg-indigo-50 border-b border-indigo-100 px-3 py-2 text-[10px] leading-snug">
                        <p className="text-indigo-700 font-bold">
                            記録・成長履歴・月齢・マイルストーン情報を参照してパーソナライズ回答します。
                        </p>
                        <p className="text-slate-500 mt-0.5">
                            ⚠️ 免責: AIによる助言は小児科医の診察に代わるものではありません。緊急時は速やかに受診してください。
                        </p>
                    </div>
                    {/* Quick chips */}
                    <div className="px-3 py-2 bg-slate-50 border-b border-slate-100 flex space-x-1.5 overflow-x-auto custom-scrollbar shrink-0">
                        {['夜泣き対策は？', '離乳食の進め方', '発熱時の対応', 'ミルクの量の目安'].map((q, idx) => (
                            <button key={idx} onClick={e => handleSendChat(e, q)} disabled={chatLoading}
                                className="whitespace-nowrap px-3 py-1 bg-white hover:bg-indigo-50 border border-slate-200 hover:border-indigo-300 text-slate-600 hover:text-indigo-700 text-xs font-semibold rounded-full shadow-sm transition-all">
                                {q}
                            </button>
                        ))}
                    </div>

                    {/* Messages */}
                    <div className="flex-1 p-4 overflow-y-auto space-y-3 custom-scrollbar">
                        {chatMessages.map((msg, idx) => (
                            <div key={idx} className={`max-w-[85%] p-3 rounded-2xl text-sm leading-relaxed ${msg.sender === 'user' ? 'bg-indigo-600 text-white rounded-tr-none ml-auto shadow-md' : 'bg-slate-100 text-slate-800 rounded-tl-none border border-slate-200'}`}>
                                {msg.text}
                            </div>
                        ))}
                        {chatLoading && (
                            <div className="flex space-x-1.5 bg-slate-100 p-3 rounded-2xl rounded-tl-none w-16 border border-slate-200">
                                {[0, 1, 2].map(i => <span key={i} className="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: `${i * 0.15}s` }} />)}
                            </div>
                        )}
                        <div ref={chatEndRef} />
                    </div>

                    {/* Input */}
                    <form onSubmit={handleSendChat} className="p-3 border-t border-slate-100 bg-white flex space-x-2 shrink-0">
                        <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)}
                            placeholder="AI相談員に質問する…"
                            disabled={chatLoading}
                            className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 transition-all" />
                        <button type="submit" disabled={chatLoading || !chatInput.trim()}
                            className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 text-white text-sm font-bold rounded-xl shadow-md shadow-indigo-100 transition-all">
                            送信
                        </button>
                    </form>
                </div>
            )}

            </main>

            {/* Bottom Tab Bar */}
            <nav className="fixed bottom-0 left-0 right-0 z-40 bg-white/85 backdrop-blur-md border-t border-slate-100 shadow-lg max-w-md mx-auto md:max-w-3xl lg:max-w-6xl">
                <div className="flex justify-around items-center py-2 px-1">
                    {[
                        { id: 'dashboard', label: '記録', icon: <Icon.Home /> },
                        { id: 'growth', label: '成長', icon: <Icon.Chart /> },
                        { id: 'facilities', label: 'お出かけ', icon: <Icon.Search /> },
                        { id: 'roadmap', label: 'ロードマップ', icon: <Icon.Roadmap /> },
                        { id: 'emergency', label: '緊急', icon: <Icon.Emergency /> },
                        { id: 'ai-consult', label: 'AI相談', icon: <Icon.Chat /> },
                    ].map(tab => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                            className={`flex flex-col items-center justify-center py-2 px-0.5 rounded-xl transition-all flex-1 min-w-0 ${activeTab === tab.id ? 'text-indigo-600 scale-105 bg-indigo-50/50 font-bold' : 'text-slate-400 hover:text-slate-600'}`}>
                            {tab.icon}
                            <span className="text-[8px] mt-0.5 font-semibold leading-tight truncate w-full text-center">{tab.label}</span>
                        </button>
                    ))}
                </div>
            </nav>

            {/* 電話発信確認モーダル */}
            {callConfirm && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 transform scale-100 transition-all space-y-4 animate-scale-up">
                        <div className="flex flex-col items-center text-center space-y-3">
                            <div className="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-3xl shadow-inner">
                                {callConfirm.emoji || '📞'}
                            </div>
                            <div className="space-y-1">
                                <h3 className="text-base font-bold text-slate-800 leading-snug">{callConfirm.label}</h3>
                                <p className="text-xl font-extrabold text-indigo-600 tracking-wider font-mono mt-0.5">{callConfirm.number}</p>
                            </div>
                            <p className="text-xs text-slate-500 leading-relaxed bg-slate-50 p-3 rounded-2xl border border-slate-100/50 w-full">
                                {callConfirm.description || 'この番号に電話をかけますか？'}
                            </p>
                        </div>
                        <div className="grid grid-cols-2 gap-3 pt-2">
                            <button
                                type="button"
                                onClick={() => setCallConfirm(null)}
                                className="py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-all text-sm active:scale-95"
                            >
                                キャンセル
                            </button>
                            <a
                                href={`tel:${callConfirm.number}`}
                                onClick={() => setCallConfirm(null)}
                                className={`py-3 text-center text-white font-bold rounded-2xl transition-all text-sm active:scale-95 shadow-md flex items-center justify-center ${
                                    callConfirm.number === '119'
                                        ? 'bg-gradient-to-r from-red-500 to-rose-600 hover:from-red-600 hover:to-rose-700 shadow-red-100'
                                        : 'bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 shadow-indigo-100'
                                }`}
                            >
                                発信する
                            </a>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
