<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" id="master-artboard" viewBox="0 0 1024 1024" width="1024px" height="1024px" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- 背景透過 (白背景のrectは削除し、透過対応とします) -->
  <g>
    <!-- 屋根: 45度の対称形、太い線で角丸 -->
    <path d="M 160 500 L 512 148 L 864 500" 
          fill="none" 
          stroke="#6366f1" 
          stroke-width="96" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- 壁: 塗りつぶし -->
    <path d="M 512 256 L 794 538 L 794 850 A 60 60 0 0 1 734 910 L 290 910 A 60 60 0 0 1 230 850 L 230 538 Z" 
          fill="#6366f1" />
    
    <!-- 針全体 (白 / S極側) -->
    <polygon points="712,460 440,588 312,860 584,732" 
             fill="#ffffff" />
    
    <!-- N極 (右上半分を濃いインディゴ #4f46e5 で塗りつぶして表現) -->
    <polygon points="712,460 440,588 584,732" 
             fill="#4f46e5" />
    
    <!-- 中央の円 (テーマカラーのインディゴ #6366f1) -->
    <circle cx="512" cy="660" r="54" 
            fill="#6366f1" />
  </g>
</svg>