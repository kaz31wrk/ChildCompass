const toDatetimeLocalValue = (d = new Date()) => {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const datetimeLocalToJst = (val) => {
    if (!val) return null;
    const d = new Date(val);
    if (isNaN(d.getTime())) return null;
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:00`;
};

const formatSuggestTime = (s) => {
    if (!s) return '—';
    const m = String(s).match(/(\d{4}\/\d{2}\/\d{2})\s+(\d{2}:\d{2})/);
    return m ? `${m[1]} ${m[2]}` : s;
};

// ============================================================
// ヘルパー：今日のログを集計
// ============================================================
const calcTodayTotals = (logs) => {
    const now = new Date();
    const todayStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    let milkMl = 0, sleepMin = 0;
    logs.forEach(log => {
        if (!log.timestamp) return;
        const logDate = new Date(log.timestamp);
        // 一貫した比較のために、あらかじめ定義した todayStr を使用
        const isToday = logDate.getMonth() === (now.getMonth()) &&
                        log.timestamp.split(' ')[0] === todayStr;
        if (!isToday) return;

        const noteMatch = s => { const m = log.note.match(new RegExp(s + ':\\s*(\\d+)')); return m ? parseInt(m[1]) : 0; };
        if (log.type === '授乳') milkMl += noteMatch('量');
        if (log.type === '睡眠') sleepMin += noteMatch('時間');
    });
    return { milkMl, sleepMin };
};
